direction: "Arm CCA 细粒度隔离与部署模型"
story_version: 1
slides:
- slide_id: d04-00-direction-intro
  paper_key: direction
  slide_type: direction_intro
  claim: "CCA deployment 这节讨论的是 Realm 抽象如何下沉到用户态、容器和进程内隔离，而不是重复 CCA 基础机制。"
  narrative:
  - "Shelter 把 CCA/RME 用到 Normal world user-space isolation，重点是 multi-GPT 和 minimal TCB。"
  - "RContainer 把 CCA primitive 改造成 container isolation，解决云原生部署中的轻量隔离问题。"
  - "NanoZone 把粒度进一步推到 CVM 内部安全域和 session-key isolation，但它是 E3 draft。"
  - "三篇共同说明 CCA 不只服务 VM 级 Realm，也会被重新组合成更细粒度的 deployment model。"
  evidence_refs:
  - "survey/evidence_ledger.md Slide Primary Ledger, 04-arm-cca-deployment."
  - "Shelter p.1 abstract; RContainer p.1 abstract; NanoZone p.1 abstract."
  proof_object:
    type: evolution_timeline
    title: "CCA deployment 粒度演进"
    data:
      steps:
      - label: "Shelter"
        claim: "user-space isolation"
        evidence: "multi-GPT, <15% workload overhead"
      - label: "RContainer"
        claim: "container isolation"
        evidence: "mixed-pagetable, lifecycle evaluation"
      - label: "NanoZone"
        claim: "intra-CVM domains"
        evidence: "draft, 20% overhead and 95% throughput claim"
  source_note: "方向页只建立粒度演进；NanoZone draft 状态保持显式。"

- slide_id: d04-01-shelter-summary
  paper_key: zhang2023shelter
  slide_type: summary
  claim: "Shelter 的核心贡献是用 Arm CCA/RME 的 GPT 能力，为 Normal world 用户态应用构造更小 TCB 的隔离区。"
  narrative:
  - "论文观察到许多 TrustZone/TEE 方案把 trusted OS 或 hypervisor 放进 TCB，而 CCA 的 Root world 提供了新的隔离机会。"
  - "Shelter 引入 Monitor 和 multi-GPT，让 user-space application 在 Normal world 中获得硬件辅助隔离。"
  - "它不是创建传统 Realm VM，而是把 CCA primitive 重组为用户态隔离机制。"
  - "这使它成为 CCA deployment 章节的第一篇主讲系统。"
  evidence_refs:
  - "Shelter p.1 abstract: extends Arm CCA with isolation in user space and minimal TCB."
  - "Shelter Fig.2: overview of Shelter and Monitor; Fig.3: multi-GPT design."
  proof_object:
    type: mechanism_flow
    title: "Shelter 机制路径"
    data:
      stages:
      - "应用请求 Shelter"
      - "Monitor 管理隔离生命周期"
      - "multi-GPT 切换访问权限"
      - "Root world enforcement"
      - "Normal world 应用隔离运行"
  source_note: "机制图按 Figure 2 和 Figure 3 重绘。"

- slide_id: d04-02-shelter-background
  paper_key: zhang2023shelter
  slide_type: background
  claim: "Shelter 的背景问题是很多应用只需要保护用户态秘密，却被迫承担 VM/TEE OS 级别的 TCB 和部署成本。"
  narrative:
  - "TrustZone 能隔离 secure services，但 third-party application 难以直接获得细粒度保护。"
  - "CCA 原生 Realm 更面向 VM 级 confidential computing，不自然等同于用户态小隔离区。"
  - "如果把完整 OS 或 hypervisor 纳入 TCB，会削弱小型 trusted computing base 的目标。"
  - "Shelter 因此选择利用 RME/GPT，把隔离粒度下沉到用户态。"
  evidence_refs:
  - "Shelter p.1 introduction: TrustZone limitations and need for user-space isolation."
  - "Shelter Table 1: physical address access permissions on Arm CCA."
  proof_object:
    type: comparison_matrix
    title: "部署粒度问题"
    data:
      columns: ["方案", "优势", "成本"]
      rows:
      - ["TrustZone TA", "成熟 secure service 模型", "生态封闭且 TCB 复杂"]
      - ["Realm VM", "强 VM 隔离", "粒度偏粗"]
      - ["Shelter", "用户态细粒度隔离", "需要新 Monitor/GPT 管理"]
  source_note: "矩阵依据 Shelter introduction 和 Table 1 的 CCA permission 背景。"

- slide_id: d04-03-shelter-solution
  paper_key: zhang2023shelter
  slide_type: solution
  claim: "Shelter 的设计关键是 multi-GPT：用多个 GPT 视图控制同一物理内存在不同上下文中的可见性。"
  narrative:
  - "Monitor 在 Root world 管理 Shelter 生命周期，并协调 Normal world OS、SPM 和 RMM 的边界。"
  - "multi-GPT 让 Shelter memory 在不同执行阶段拥有不同访问属性。"
  - "shadow GPT construction 降低 GPT 构造成本。"
  - "这种做法把 CCA 的 granule 权限从 VM 级抽象转成应用级隔离工具。"
  evidence_refs:
  - "Shelter Fig.2: system overview and Monitor position."
  - "Shelter Fig.3 and Table 2: multi-GPT design and GPI encoding."
  proof_object:
    type: mechanism_flow
    title: "multi-GPT 生命周期"
    data:
      stages:
      - "分配 Shelter memory"
      - "构造 Shelter GPT"
      - "切换访问权限"
      - "进入隔离执行"
      - "退出并清理 memory/cache"
  source_note: "流程按 Figure 3、Table 2 和 lifecycle 描述重绘。"

- slide_id: d04-04-shelter-experiments
  paper_key: zhang2023shelter
  slide_type: experiments
  claim: "Shelter 的结果显示 real-world workload modest overhead 小于 15%，shadow GPT 平均降低 77.5% GPT construction overhead。"
  narrative:
  - "摘要报告 real-world workloads 上 modest performance overhead 小于 15%。"
  - "Table 5/6 分解 Shelter lifecycle operation costs。"
  - "Figure 5 显示 shadow GPT construction 能平均降低 77.5% GPT construction overhead。"
  - "这些结果支撑用户态隔离可行性，但不证明 container 或 accelerator 场景。"
  evidence_refs:
  - "Shelter p.1 abstract: modest performance overhead <15% on real-world workloads."
  - "Shelter Table 5-Table 6 and Fig.5: operation breakdown and 77.5% GPT construction overhead reduction."
  proof_object:
    type: metric_bars
    title: "Shelter 关键数字"
    data:
      metrics:
      - label: "real-world workload overhead"
        value: "<15%"
        bar: 15
        note: "abstract"
      - label: "GPT construction reduction"
        value: "77.5%"
        bar: 78
        note: "Fig.5"
      - label: "evidence class"
        value: "E1"
        bar: 55
        note: "peer-reviewed system paper"
  source_note: "数字来自摘要和 Figure 5；未外推到其它 deployment 模型。"

- slide_id: d04-05-shelter-evaluation
  paper_key: zhang2023shelter
  slide_type: evaluation
  claim: "Shelter 证明 CCA primitive 可被重组为用户态隔离，但它的部署边界仍依赖 Monitor、GPT 管理和应用改造。"
  narrative:
  - "优点是把 CCA 的硬件隔离能力引入更细粒度应用场景。"
  - "不足是需要新增 Monitor 和 lifecycle 管理，且不是原生 Realm VM 模型。"
  - "商业潜力在移动/边缘设备上的敏感用户态组件保护。"
  - "落地风险包括 ABI 稳定性、内存回收、cache 清理和与现有 OS 安全模型的整合。"
  evidence_refs:
  - "Shelter Fig.2-Fig.3: Monitor and multi-GPT design."
  - "Shelter conclusion: CCA/RME-based user-space isolation with minimal TCB."
  proof_object:
    type: comparison_matrix
    title: "评价"
    data:
      columns: ["维度", "判断"]
      rows:
      - ["强项", "把 CCA/RME 用到用户态隔离"]
      - ["短板", "新增 Monitor 和 GPT lifecycle 复杂度"]
      - ["落地场景", "敏感应用、移动/边缘 secure component"]
      - ["不能承担", "container/accelerator/I/O 安全结论"]
  source_note: "评价结合设计图、实验数字和论文 conclusion。"

- slide_id: d04-06-rcontainer-summary
  paper_key: zhou2025rcontainer
  slide_type: summary
  claim: "RContainer 的核心是把 CCA 硬件 primitive 改造成 container isolation，而不是把容器简单塞进一个 VM。"
  narrative:
  - "论文面向云原生容器的弱隔离问题。"
  - "它扩展 Arm CCA hardware primitives，为 containers 提供来自不可信 OS 的保护和 container 间强隔离。"
  - "设计包括 mixed-pagetable、container security monitor 和 lightweight runtime support。"
  - "它比 Shelter 更靠近云部署场景，是 CCA containerization 的主证据。"
  evidence_refs:
  - "RContainer p.1 abstract: secure container architecture through extending ARM CCA hardware primitives."
  - "RContainer Fig.1: architecture; Fig.2: mixed-pagetable."
  proof_object:
    type: mechanism_flow
    title: "RContainer 架构路径"
    data:
      stages:
      - "container launch"
      - "security monitor setup"
      - "mixed-pagetable isolation"
      - "protected container execution"
      - "lifecycle cleanup"
  source_note: "机制图按 Figure 1 和 Figure 2 重绘。"

- slide_id: d04-07-rcontainer-background
  paper_key: zhou2025rcontainer
  slide_type: background
  claim: "容器的问题不是性能，而是弱隔离；虚拟机能补安全但会破坏容器轻量化目标。"
  narrative:
  - "容器因部署快和资源利用率高而广泛用于云平台。"
  - "但容器共享 host kernel，隔离强度弱于 VM。"
  - "把容器放进完整 VM 能增强隔离，却引入 heavyweight virtualization 和更高运行成本。"
  - "RContainer 试图用 CCA primitive 让容器保持轻量，同时从 untrusted OS 中隔离。"
  evidence_refs:
  - "RContainer p.1 abstract and introduction: container weak isolation and virtualization tradeoff."
  - "RContainer Section II: background and threat model for secure containers."
  proof_object:
    type: comparison_matrix
    title: "container isolation tradeoff"
    data:
      columns: ["方案", "强项", "短板"]
      rows:
      - ["Native container", "轻量、高密度", "共享 kernel 隔离弱"]
      - ["Container in VM", "隔离强", "启动和资源成本高"]
      - ["RContainer", "CCA-backed container isolation", "需要硬件/monitor 支持"]
  source_note: "矩阵依据摘要和 introduction 对容器隔离问题的设定。"

- slide_id: d04-08-rcontainer-solution
  paper_key: zhou2025rcontainer
  slide_type: solution
  claim: "RContainer 的关键机制是 mixed-pagetable 和少量 privileged monitor 支持，把容器内存从 host kernel 中隔出来。"
  narrative:
  - "Fig.1 展示 RContainer architecture，将 container security monitor 放入关键路径。"
  - "Fig.2 的 mixed-pagetable 解决容器地址空间和保护属性的组合问题。"
  - "论文还向 ATF 增加少量 SMC calls 来支持 GPT 切换和批量 GPI 设置。"
  - "它的设计目标是强隔离、低 TCB 和容器生态兼容之间取平衡。"
  evidence_refs:
  - "RContainer Fig.1-Fig.2: architecture and mixed-pagetable."
  - "RContainer conclusion and implementation discussion: SMC_GPT_SET_GPTBR_EL3 and SMC_GPT_SET_GPI_BATCH."
  proof_object:
    type: mechanism_flow
    title: "RContainer 保护流程"
    data:
      stages:
      - "runtime 创建 protected container"
      - "monitor 配置 GPT/pagetable"
      - "mixed-pagetable 映射 container memory"
      - "OS 只能管理非敏感部分"
      - "container lifecycle 受控结束"
  source_note: "流程按 Figure 1、Figure 2 和 conclusion 中的 SMC/GPT 描述重绘。"

