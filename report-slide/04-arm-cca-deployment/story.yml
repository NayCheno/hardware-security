- slide_id: d04-10-rcontainer-evaluation
  paper_key: zhou2025rcontainer
  slide_type: evaluation
  claim: "RContainer 的价值在于把 CCA 推向云原生形态，但它也把 container runtime、monitor 和 GPT 管理变成新的工程约束。"
  narrative:
  - "优点是直接瞄准容器弱隔离这个高价值部署问题。"
  - "不足是需要改硬件/firmware/monitor 路径，且论文评估平台与真实云规模仍有距离。"
  - "商业潜力在机密容器、serverless 和多租户 PaaS。"
  - "风险在容器生态兼容、debug/observability、sidecar/network/storage 路径是否同步保护。"
  evidence_refs:
  - "RContainer Fig.1-Fig.2: architecture and mixed-pagetable design."
  - "RContainer Fig.5-Fig.8: workload and scaling evaluation."
  proof_object:
    type: comparison_matrix
    title: "评价"
    data:
      columns: ["维度", "判断"]
      rows:
      - ["强项", "CCA-backed container isolation"]
      - ["短板", "monitor/GPT/runtime 集成复杂"]
      - ["落地场景", "机密容器和 serverless"]
      - ["风险", "网络、存储、sidecar 路径需要额外保护"]
  source_note: "评价结合 RContainer 的架构图、workload 评估和本报告 I/O 边界。"

- slide_id: d04-11-nanozone-summary
  paper_key: liu2025nanozone
  slide_type: summary
  claim: "NanoZone 把 CCA 隔离粒度推进到 CVM 内部安全域，但它是 2025 draft，必须保留成熟度边界。"
  narrative:
  - "论文关注 Arm CCA 当前以整个 CVM 为主要隔离粒度的问题。"
  - "它提出 NanoZone，为 CVM 内部不同敏感组件提供细粒度内存保护。"
  - "设计涉及 user-level domain switch、permission overlay 和 code-pointer integrity。"
  - "本报告把它作为 E3 draft SOTA，不写成 ratified 或 peer-reviewed 事实。"
  evidence_refs:
  - "NanoZone p.1 abstract: scalable, efficient, secure memory protection for Arm CCA."
  - "NanoZone Fig.1: comparison between NanoZone and other CCA-based TEEs."
  proof_object:
    type: mechanism_flow
    title: "NanoZone 目标路径"
    data:
      stages:
      - "CVM 内部划分安全域"
      - "配置 permission overlay"
      - "user-level domain switch"
      - "CPI 防 domain-switch abuse"
      - "保护 session-key 等敏感对象"
  source_note: "机制路径依据摘要、Figure 1 和 introduction；draft 状态显式保留。"

- slide_id: d04-12-nanozone-background
  paper_key: liu2025nanozone
  slide_type: background
  claim: "CVM 级隔离不能自动解决 CVM 内部的大 TCB 问题，特别是内核和大型应用中的 privilege-escalation bug。"
  narrative:
  - "现代 Linux 和安全关键应用代码量很大，CVM 内部漏洞仍可能泄露 secrets。"
  - "Realm/CVM 保护的是对外部 host 的隔离，不等于内部最小权限。"
  - "细粒度内存保护希望把 session key、crypto state、sensitive module 与其它代码分开。"
  - "NanoZone 因此把问题从 inter-VM isolation 转到 intra-CVM compartment。"
  evidence_refs:
  - "NanoZone p.1 introduction: intra-process threats and large CVM software stack."
  - "NanoZone Fig.1: comparison with other CCA-based TEEs."
  proof_object:
    type: comparison_matrix
    title: "CVM 内外两类威胁"
    data:
      columns: ["威胁", "CCA 基础保护", "NanoZone 关注"]
      rows:
      - ["host/hypervisor", "Realm/CVM 隔离", "继承基础保护"]
      - ["CVM kernel bug", "不一定隔离", "域内细粒度保护"]
      - ["library/app bug", "同地址空间暴露", "session-key isolation"]
      - ["domain switch abuse", "基础 CCA 不覆盖", "CPI 约束"]
  source_note: "矩阵依据 NanoZone introduction 中的 intra-CVM threat framing。"

- slide_id: d04-13-nanozone-solution
  paper_key: liu2025nanozone
  slide_type: solution
  claim: "NanoZone 的设计逻辑是用 permission overlay 和快速域切换，把 CCA 的粗粒度保护转成应用内 compartment。"
  narrative:
  - "论文提出功能原型和性能变体，面向 session-key isolation 等场景。"
  - "POR_EL0/PIRE0_EL1 等 permission overlay 机制用于控制用户态访问。"
  - "fast user-level CPI 约束 domain-switch control flow。"
  - "这些机制说明 CCA deployment 的下一步是内部 least privilege，而不只是外部 host isolation。"
  evidence_refs:
  - "NanoZone p.1-p.2 abstract/introduction: permission overlay and fast user-level CPI."
  - "NanoZone Figure 1 and design sections: NanoZone compared with CCA-based TEEs."
  proof_object:
    type: mechanism_flow
    title: "NanoZone compartment flow"
    data:
      stages:
      - "定义保护域"
      - "设置 permission overlay"
      - "进入敏感代码域"
      - "CPI 检查 domain switch"
      - "退出并恢复权限"
  source_note: "流程根据 NanoZone 摘要和设计描述重写；不视为 ratified CCA feature。"

