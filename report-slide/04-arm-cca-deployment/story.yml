- slide_id: d04-16-direction-summary
  paper_key: direction
  slide_type: direction_summary
  claim: "CCA deployment 的主线是隔离粒度逐步变细，但每一步都把新的 runtime、monitor 或 permission machinery 放进工程约束。"
  narrative:
  - "Shelter 证明 CCA/RME 可以支持用户态隔离。"
  - "RContainer 证明 CCA primitive 可以服务云原生容器隔离。"
  - "NanoZone 指向 CVM 内部安全域，但仍是 draft。"
  - "这三篇共同说明 CCA 的价值不只在 Realm VM，也在如何被安全地组合到实际软件栈中。"
  evidence_refs:
  - "Shelter Fig.2-Fig.5; RContainer Fig.1-Fig.7; NanoZone p.1 and Fig.1."
  - "survey/evidence_ledger.md Slide Primary Ledger, 04-arm-cca-deployment."
  proof_object:
    type: comparison_matrix
