  reference: reference/arm-confidential-computing/shelter-extending-arm-cca-with-isolation-in-user-space/paper.pdf
  title: 'Shelter: CCA 用户态隔离'
  auxiliary: []
  slides:
    summary:
      claim: 用 Arm CCA 支持用户态隔离，把 Realm 能力从 VM 级机密计算推进到 user-space compartment
      points:
      - 用 Arm CCA 支持用户态隔离，把 Realm 能力从 VM 级机密计算推进到 user-space compartment
      visual:
        title: 证据定位
        items:
        - 角色：foundational
        - 证据：E1 / Foundational
        - 来源：local_pdf_verified
    background:
      claim: Realm 机制不必只服务 VM
      points:
      - Realm 机制不必只服务 VM
      - 进程内敏感代码同样需要小 TCB、host-untrusted 的隔离边界
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 把 CCA primitives 封装成用户态隔离模型，让应用 compartment 在不完全信任 OS/host 的前提下运行敏感逻辑
      points:
      - 把 CCA primitives 封装成用户态隔离模型，让应用 compartment 在不完全信任 OS/host 的前提下运行敏感逻辑
      visual:
        title: 关键机制
        items:
        - User-space compartment over Arm CCA
        - Realm-backed isolation boundary
        - Runtime and OS integration path for fine-grained protection
    experiments:
      claim: USENIX Security 论文提供原型与开销评估；具体数值需回引本地 PDF
      points:
      - USENIX Security 论文提供原型与开销评估；具体数值需回引本地 PDF
      visual:
        title: 证据强度
        items:
        - 类型：E1 peer-reviewed primary work
        - 成熟度：peer-reviewed primary work
        - PDF：local_pdf_verified
    evaluation:
      claim: 开辟 CCA 细粒度使用方式，是从 VM Realm 走向应用隔离的方向入口
      strengths: 开辟 CCA 细粒度使用方式，是从 VM Realm 走向应用隔离的方向入口。
      limitations: 系统原型不等同于通用 ABI 或量产部署，生态依赖 runtime、OS 与 CCA 硬件支持。
      commercialization: 对云端敏感函数、插件隔离和移动端安全服务有潜力；风险在开发者可用性和平台普及速度。
