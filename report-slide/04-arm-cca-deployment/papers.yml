direction: Arm CCA 细粒度隔离与部署模型
focus: 从 VM 级 Realm 扩展到用户态、容器、进程内与移动/Android 部署。
selection_rule: 固定三篇 primary；`liu2025lesstrust` 作为 intra-process 辅助材料，不计入三篇主讲。
primary:
- key: zhang2023shelter
  role: foundational
  selection_reason: Shelter is the entry peer-reviewed system for moving CCA from VM Realms to user-space isolation.
  evidence_type: E1 peer-reviewed primary work
  maturity: peer-reviewed primary work
  pdf_status: local_pdf_verified
  source_url: https://www.usenix.org/conference/usenixsecurity23/presentation/zhang-yiming
