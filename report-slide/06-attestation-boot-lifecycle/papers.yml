  slides:
    summary:
      claim: 提出软件 attestation 的早期代表方法，用 timing-sensitive checksum 让远程 verifier 检查设备内存内容
      points:
      - 提出软件 attestation 的早期代表方法，用 timing-sensitive checksum 让远程 verifier 检查设备内存内容
      visual:
        title: 证据定位
        items:
        - 槽位：primary_1
        - 类型：system
        - 证据：E1 / Foundational
        - 来源：local_pdf_verified
    background:
      claim: 低端嵌入式设备缺少硬件 root of trust，但仍需要远程确认代码完整性和启动状态
      points:
      - 低端嵌入式设备缺少硬件 root of trust，但仍需要远程确认代码完整性和启动状态
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 用严格时间假设约束 prover 计算能力，使篡改设备难以伪造完整内存 checksum
      points:
      - 用严格时间假设约束 prover 计算能力，使篡改设备难以伪造完整内存 checksum
      visual:
        title: 关键机制
        items:
        - Software-only remote attestation
        - Timing-sensitive memory checksum
        - Verifier/prover challenge-response model
    experiments:
      claim: 论文在嵌入式节点场景评估
      points:
      - 论文在嵌入式节点场景评估
      - 安全性强依赖 timing、硬件和网络假设
      visual:
        title: 证据强度
        items:
        - 类型：E1 peer-reviewed primary work
        - 成熟度：peer-reviewed primary work
        - PDF：local_pdf_verified
    evaluation:
      claim: 历史价值高，能解释 attestation 从软件测量走向硬件 RoT 的动因
      strengths: 历史价值高，能解释 attestation 从软件测量走向硬件 RoT 的动因。
      limitations: 面对现代强对手和复杂 SoC/TEE 时适用性有限。
      commercialization: 现代商业方案应转向硬件 RoT、标准化 evidence 和 verifier policy；SWATT 主要作为历史基线。
