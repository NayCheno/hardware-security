direction: Attestation、boot、lifecycle
focus: 区分 secure boot、launch attestation、runtime/control-flow evidence、evidence profile 与 verifier policy。
selection_rule: 固定三篇 primary；`rats_rfc` 主讲 attestation architecture，`eat_rfc` 作为 token-format auxiliary；C-FLAT/LO-FAT/PDRIMA
  作为 runtime-attestation lineage auxiliary。
primary:
