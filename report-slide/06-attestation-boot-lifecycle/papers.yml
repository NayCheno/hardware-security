  source_status: local_pdf_verified
  reference: reference/attestation/c-flat-control-flow-attestation-embedded-systems-software/paper.pdf
  use: 辅助说明 control-flow attestation 问题起点；不计入三篇主讲。
- key: dessouky2017lofat
  role: Hardware CFA lineage
  evidence: E1 / Peer-reviewed primary
  source_status: local_pdf_verified
  reference: reference/attestation/lo-fat-low-overhead-control-flow-attestation-hardware/paper.pdf
  use: 辅助说明硬件 control-flow attestation 如何降低插桩开销；不计入三篇主讲。
- key: mao2025pdrima
