direction: Attestation、boot、lifecycle
focus: 区分 secure boot、launch attestation、runtime freshness、evidence profile 与 verifier
  policy。
selection_rule: 第一篇为 foundational/方向入口，后两篇优先选择 SOTA/spec/draft/industry evidence。
papers:
- key: seshadri2004swatt
  role: Foundational / IEEE S&P 2004
  title: 'SWATT: 软件 attestation 早期代表'
  summary: 提出软件 attestation 的早期代表方法。
  background: 低端嵌入式设备缺少硬件 root of trust，但仍需要远程确认代码完整性。
  solution: 用 timing-sensitive checksum 让远程 verifier 检查设备内存内容。
  experiment: 论文在嵌入式节点场景评估；安全性强依赖时间和硬件假设。
  comment: 历史价值高；现代高威胁模型下适用性有限。商业应用应转向硬件 RoT 与标准化 evidence。
- key: rats_rfc + eat_rfc
  role: Spec/standard SOTA / RFC 9334 + RFC 9711
  title: RATS 架构与 Entity Attestation Token
  summary: RATS 定义 attester、verifier、relying party、evidence、reference values 和 attestation
    results；EAT 定义 token claims。
  background: 多平台 attestation 同时需要可互操作的架构术语和证据编码。
  solution: RATS 规范化 evidence 生成、传递、评估角色与消息；EAT 用 CWT/JWT 承载实体状态和安全属性 claims。
  experiment: RFC，无实验。
  comment: 标准化落地潜力强；不能说明某平台测量链是否充分，也不能替代 CCA/CoVE 平台规范。
- key: mao2025pdrima
  role: Draft/not ratified / arXiv 2025
  title: Policy-driven runtime integrity measurement
  summary: 研究 TrustZone-based TEE 的 policy-driven runtime integrity measurement attestation。
  background: secure boot/launch attestation 不能覆盖运行时状态变化。
  solution: 把策略驱动的 runtime measurement 融入 attestation。
  experiment: arXiv 论文，本地 PDF 可用；具体结果需回引原文。
  comment: 适合补 runtime attestation；不要把它泛化为 CCA/CoVE 的完整 evidence chain。
