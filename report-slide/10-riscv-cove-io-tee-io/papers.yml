        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 设计 scalable I/O protection metadata/checking 机制，提高设备访问控制效率并支撑更大规模 I/O pro。
      points:
      - 设计 scalable I/O protection metadata/checking 机制，提高设备访问控制效率并支撑更大规模 I/O protection
      visual:
        title: 关键机制
        items:
        - Scalable I/O protection metadata
        - Device access-control checking path
        - TEE-oriented DMA isolation substrate
    experiments:
      claim: ASPLOS 论文给出吞吐和开销评估
