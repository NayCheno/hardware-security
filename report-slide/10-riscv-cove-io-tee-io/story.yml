  paper_key: direction
  slide_type: direction_summary
  claim: "CoVE-IO 的 takeaway 是 trusted I/O 必须同时有 access control、device lifecycle 和 ratified translation substrate。"
  narrative:
  - "sIOPMP 给出 TEE-oriented I/O access-control 系统证据。"
  - "CoVE-IO draft 给出 RISC-V TVM trusted device lifecycle。"
  - "RISC-V IOMMU 给出 DMA translation/protection 标准基底。"
  - "完整安全还需要 13 的 SPDM/TDISP/TLS+RA endpoint evidence 和具体 device 系统论文。"
  evidence_refs:
  - "sIOPMP Fig.4-Fig.9; CoVE-IO Section 7.1-7.7; RISC-V IOMMU Section 3."
  - "survey/evidence_ledger.md Slide Primary Ledger, 10-riscv-cove-io-tee-io."
  proof_object:
    type: comparison_matrix
    title: "CoVE-IO 组合边界"
    data:
      columns: ["组件", "本方向来源", "仍需补充"]
