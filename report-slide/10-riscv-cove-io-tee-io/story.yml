      - ["DMA access control", "sIOPMP/IOMMU", "implementation correctness"]
      - ["device lifecycle", "CoVE-IO draft", "TDISP public details"]
      - ["interrupt", "IOMMU MSI + AIA", "trusted interrupt binding"]
      - ["endpoint channel", "本方向不完整", "SPDM/TLS+RA"]
  source_note: "方向总结把 E1 mechanism、E3 draft 和 E0 spec 分层。"
