  source_note: "无新实验；本页按 SoK taxonomy 使用。"

- slide_id: d05-12-soktee-background
  paper_key: sok-tee
  slide_type: background
  claim: "accelerator confidential computing 的难点是保护对象跨越 host memory、device memory、command queue 和 result path；无新实验。"
  narrative:
  - "SoK 的 attack-vector 图说明 accelerator computing 中存在 host、driver、device memory 和 data movement 风险。"
  - "CPU TEE 只覆盖其中一段路径。"
  - "ACAI 关注 DMA/MMIO/data path，Devlore 关注 interrupt control path。"
  - "因此本方向需要 taxonomy 来避免把所有 device security 问题混为一谈。"
  evidence_refs:
  - "Accelerator TEE SoK Fig.2: attack vectors of accelerator computing."
  - "Accelerator TEE SoK Table II: design overview of accelerator TEE types."
  proof_object:
    type: path_compare
    title: "accelerator workload 路径"
    data:
      paths:
      - label: "data path"
        steps: ["Realm memory", "DMA buffer", "accelerator memory", "result buffer"]
        note: "ACAI 主要关注"
      - label: "control path"
        steps: ["command queue", "MMIO", "interrupt", "driver handler"]
        note: "Devlore 补 interrupt"
  source_note: "无新实验；路径按 SoK attack-vector 与本方向两篇系统论文对齐。"

