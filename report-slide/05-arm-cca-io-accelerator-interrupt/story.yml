  paper_key: bertschi2026devlore
  slide_type: experiments
  claim: "Devlore 在典型 integrated GPU 应用中报告 0.06% overhead，并在 interrupt path breakdown 中定位主要检查成本。"
  narrative:
  - "论文在 Arm FVP 和 Arm board 上实现并评估 Devlore。"
  - "摘要报告典型 integrated GPU applications 的 overhead 为 0.06%。"
  - "Figure 7 展示 GPU interrupt flow breakdown，说明 checking virtual interrupts 是主要新增时间来源之一。"
  - "Figure 9 用 glmark2 board case study 检查真实 GPU workload。"
  evidence_refs:
  - "Devlore p.1 abstract: 0.06% overhead for typical integrated GPU applications."
  - "Devlore Fig.7-Fig.9: interrupt flow breakdown, stress test and glmark2 board case study."
  proof_object:
    type: metric_bars
    title: "Devlore reported results"
    data:
      metrics:
      - label: "typical GPU app overhead"
        value: "0.06%"
        bar: 3
        note: "abstract"
      - label: "interrupt path"
        value: "Fig.7"
        bar: 55
        note: "flow breakdown"
      - label: "stress test"
        value: "Fig.8"
        bar: 50
        note: "sustained interrupt load"
      - label: "board case"
        value: "glmark2"
        bar: 60
        note: "Fig.9"
  source_note: "数字和图号来自摘要与 evaluation；E3 draft 状态保留。"

- slide_id: d05-10-devlore-evaluation
  paper_key: bertschi2026devlore
  slide_type: evaluation
  claim: "Devlore 补上 CCA I/O 中的 interrupt 缺口，但它不解决设备身份、DMA 隔离或 data-path 加密。"
  narrative:
  - "优点是把中断 authenticity/order 从隐含假设变成显式机制。"
  - "不足是范围集中在 interrupt path，不能替代 ACAI、CoVE-IO 或 SPDM/TDISP。"
  - "商业潜力在 CVM 使用 integrated GPU、NIC 或 storage device 时减少 host interrupt 注入风险。"
  - "落地风险包括 GIC/vGIC 兼容、device driver 修改和多设备并发场景。"
  evidence_refs:
  - "Devlore Fig.2-Fig.4: interrupt isolation and registration design."
  - "Devlore Table 2 and Fig.9: driver compatibility and GPU case study."
  proof_object:
    type: comparison_matrix
    title: "评价"
    data:
      columns: ["维度", "判断"]
      rows:
      - ["强项", "把 interrupt 作为独立可信边界"]
      - ["短板", "不覆盖 DMA/MMIO/link/device identity 全部问题"]
      - ["落地场景", "CVM 使用真实设备的 interrupt path"]
      - ["风险", "GIC/vGIC 和 driver 兼容"]
  source_note: "评价聚焦 Devlore 的 interrupt scope，不外推到完整 trusted I/O。"

