direction: "Arm CCA I/O、DMA、accelerator、interrupt"
story_version: 1
slides:
- slide_id: d05-00-direction-intro
  paper_key: direction
  slide_type: direction_intro
  claim: "CCA I/O 这节讨论 CPU Realm 之外的边界：DMA、MMIO、interrupt 和 accelerator workflow 都会把秘密带出 CPU 本地路径。"
  narrative:
  - "ACAI 关注 accelerator execution，把 CCA granule protection 扩到 PCIe/GPU/FPGA 访问路径。"
  - "Devlore 关注 device interrupt protection，说明中断也会破坏 confidential VM 的完整性和控制流。"
  - "Accelerator TEE SoK 提供分类坐标，帮助区分 Host-type、Acc.-type、Mix-type 和 data path 保护范围。"
  - "三篇共同说明 CCA 基础 Realm 不自动等于 trusted I/O。"
  evidence_refs:
  - "survey/evidence_ledger.md Slide Primary Ledger, 05-arm-cca-io-accelerator-interrupt."
  - "ACAI p.1 abstract; Devlore p.1 abstract; Accelerator TEE SoK p.1 abstract."
  proof_object:
    type: comparison_matrix
    title: "CCA I/O 的三个子问题"
    data:
      columns: ["问题", "主证据", "边界"]
      rows:
      - ["accelerator data path", "ACAI", "E3 draft"]
      - ["interrupt authenticity/order", "Devlore", "E3 draft"]
      - ["accelerator TEE taxonomy", "SoK", "E2 classification"]
      - ["完整 trusted I/O", "需要 CoVE-IO/SPDM/TDISP 等后续证据", "本节不单独证明"]
  source_note: "方向页只建立问题拆分；ACAI/Devlore 均保留 draft-not-ratified 状态。"

- slide_id: d05-01-acai-summary
  paper_key: acai2023
  slide_type: summary
  claim: "ACAI 的核心贡献是让 CCA-enabled peripheral 直接安全访问 Realm memory，而不是让 VM 先把数据复制到非安全缓冲区。"
  narrative:
  - "论文指出 confidential VM 想使用 GPU/FPGA 时，传统做法常需要 extra copy 和 software encryption。"
  - "ACAI 重新设计 CCA I/O path，使 accelerator 的 bus transaction 和 address translation 也接受 granule protection checks。"
  - "它用 PCIe IDE keying、SMMU/GPT enforcement 和 realm/device lifecycle 组合保护 accelerator execution。"
  - "它是早期 draft 系统，不是 Arm CCA 标准已完成的 trusted I/O 证明。"
  evidence_refs:
  - "ACAI p.1 abstract: protects accelerator execution with Arm CCA and extends granule protection checks to bus transactions."
  - "ACAI Fig.1 and Table 1: access modes and copy/encryption-decryption operation comparison."
  proof_object:
    type: path_compare
    title: "encrypted-copy path vs ACAI path"
    data:
      paths:
      - label: "传统加密搬运"
        steps: ["Realm encrypts buffer", "copy to shared memory", "device computes", "copy back", "Realm decrypts"]
        note: "extra copies and software crypto"
      - label: "ACAI"
        steps: ["Realm grants device path", "GPC/SMMU checks", "IDE-protected PCIe path", "accelerator computes"]
        note: "device transaction becomes checked path"
  source_note: "路径重绘自 Figure 1、Table 1 和摘要。"

- slide_id: d05-02-acai-background
  paper_key: acai2023
  slide_type: background
  claim: "ACAI 的背景矛盾是 CCA 保护了 Realm memory，但 accelerator 访问通常发生在 CPU 核心之外。"
  narrative:
  - "CCA 的 granule protection checks 本来主要约束 CPU 和系统内存访问。"
  - "GPU/FPGA 通过 MMIO、DMA、SMMU 和 PCIe 访问数据，路径上有 host、driver、Root Port 和 device state。"
  - "如果只允许 shared memory + software encryption，安全上保守但性能和可用性差。"
  - "因此 ACAI 试图把 CCA 的保护语义扩展到 accelerator transaction。"
  evidence_refs:
  - "ACAI p.1-p.2 introduction: CCA success and caveat that tenants cannot securely use accelerators."
  - "ACAI Fig.2: GPC in Arm CCA and protected transaction context."
  proof_object:
    type: comparison_matrix
    title: "accelerator 路径中的边界对象"
    data:
      columns: ["对象", "为什么危险", "ACAI 处理方向"]
      rows:
      - ["MMIO", "host 可配置 device interface", "限制可见寄存器和访问"]
      - ["DMA", "device 可读写内存", "SMMU/GPT 联动检查"]
      - ["PCIe link", "链路可被观察或篡改", "IDE key 保护"]
      - ["driver/runtime", "software TCB 增大", "减少 copy path"]
  source_note: "问题拆分依据 introduction、Figure 2 和 Figure 5。"

- slide_id: d05-03-acai-solution
  paper_key: acai2023
  slide_type: solution
  claim: "ACAI 的设计把 device lifecycle、GPT/SMMU 检查和 IDE link protection 组合成 accelerator execution 的可信路径。"
  narrative:
  - "Figure 5 展示 MMIO 和 DMA 在 ACAI 中如何经过 protection path。"
  - "Table 2 总结 ACAI 引入的新接口和更新。"
  - "Root Port 中的 IDE key 与 device access control 共同限制 accelerator 与 Realm 之间的数据流。"
  - "它的安全性来自多组件组合，而不是某一个单独寄存器或 driver patch。"
  evidence_refs:
  - "ACAI Fig.5: MMIO and DMA in ACAI with IDE keys in Root Ports."
  - "ACAI Table 2: new interfaces and updates introduced by ACAI."
  proof_object:
    type: mechanism_flow
    title: "ACAI trusted accelerator flow"
    data:
      stages:
      - "Realm 创建并声明 accelerator 需求"
      - "host 发起 attach_dev 等管理请求"
      - "RMM/firmware 检查 device lifecycle"
      - "SMMU/GPT 约束 DMA"
      - "PCIe IDE 保护 link"
      - "accelerator 访问 Realm buffer"
  source_note: "流程按 Figure 5 和 Table 2 重绘；保留 draft 证据边界。"

- slide_id: d05-04-acai-experiments
  paper_key: acai2023
  slide_type: experiments
  claim: "ACAI 报告 GPU 平均 43.5% 和 FPGA 平均 12.1% 额外代价，优化后相对原 ACAI 有 26.05% 和 3.1% speedup。"
  narrative:
  - "作者在 Arm public simulator 和开发板环境中评估 GPU 与 FPGA workloads。"
  - "摘要报告 ACAI 在 GPU/FPGA 上分别带来 43.5% 和 12.1% average overhead。"
  - "优化版本 ACAI OPT 相对 ACAI 在 GPU/FPGA 上分别有 26.05% 和 3.1% speedup。"
  - "这些数字支撑 early design feasibility，但必须按 E3 draft 阅读。"
  evidence_refs:
  - "ACAI p.1 abstract: 43.5% GPU and 12.1% FPGA overhead."
  - "ACAI Fig.7 and evaluation text: GPU benchmark overheads and ACAI OPT speedup numbers."
  proof_object:
    type: metric_bars
    title: "ACAI reported results"
    data:
      metrics:
      - label: "GPU overhead"
        value: "43.5%"
        bar: 44
        note: "abstract"
      - label: "FPGA overhead"
        value: "12.1%"
        bar: 12
        note: "abstract"
      - label: "GPU OPT speedup"
        value: "26.05%"
        bar: 26
        note: "evaluation"
      - label: "FPGA OPT speedup"
        value: "3.1%"
        bar: 3
        note: "evaluation"
  source_note: "数字来自摘要和 evaluation；本页不写成标准化 trusted I/O 结果。"

- slide_id: d05-05-acai-evaluation
  paper_key: acai2023
  slide_type: evaluation
  claim: "ACAI 的价值是把 CCA data path 推到 accelerator，但短板是 draft 成熟度、硬件依赖和完整 device identity/lifecycle 仍需补证据。"
  narrative:
  - "优点是明确指出 CCA CPU boundary 之外的 accelerator blind spot。"
  - "不足是依赖模拟器、开发板和设计扩展，不能视为已部署标准。"
  - "商业潜力在 GPU/FPGA confidential workload，尤其是 AI 和专用加速。"
  - "落地风险包括 device attestation、IDE key management、driver compatibility 和 multi-tenant scheduling。"
  evidence_refs:
  - "ACAI Fig.5 and Table 2: trusted accelerator path and interfaces."
  - "survey/evidence_ledger.md Boundary Records: draft/not ratified must remain explicit."
  proof_object:
    type: comparison_matrix
    title: "评价"
    data:
      columns: ["维度", "判断"]
      rows:
      - ["强项", "把 Realm 数据路径延伸到 accelerator"]
      - ["短板", "E3 draft，硬件/firmware 依赖强"]
      - ["落地场景", "confidential GPU/FPGA workload"]
      - ["不能承担", "完整 SPDM/TDISP/device lifecycle 证明"]
  source_note: "评价结合 ACAI 范围和本报告 confidential I/O 证据边界。"

- slide_id: d05-06-devlore-summary
  paper_key: bertschi2026devlore
  slide_type: summary
  claim: "Devlore 的核心贡献是把 device interrupt 也纳入 confidential VM 边界，阻止 host 随意伪造或重放设备中断。"
  narrative:
  - "论文指出攻击者可注入 malicious interrupts，破坏 confidential VM 的机密性和完整性。"
  - "Devlore 让 CVM 注册 device interrupts，并由 monitor/RMM 检查物理中断与虚拟中断的绑定。"
  - "它关注的是 interrupt path，不是 DMA、MMIO 或 device identity 的全部问题。"
  - "它是 2026 draft，适合作为最新 interrupt protection 方向证据。"
  evidence_refs:
  - "Devlore p.1 abstract: malicious interrupt injection can break confidentiality and integrity of confidential VMs."
  - "Devlore Fig.2: interrupt isolation design."
  proof_object:
    type: path_compare
    title: "未保护 interrupt vs Devlore"
    data:
      paths:
      - label: "unprotected path"
        steps: ["device event", "host/GIC config", "virtual interrupt", "CVM handles"]
        note: "host can inject or misroute"
      - label: "Devlore path"
        steps: ["CVM registers interrupt", "monitor records physical IRQ", "RMM checks binding", "virtual IRQ delivered"]
        note: "interrupt authenticity is mediated"
  source_note: "路径重绘自 Figure 2 和摘要。"

- slide_id: d05-07-devlore-background
  paper_key: bertschi2026devlore
  slide_type: background
  claim: "中断是 CCA I/O 边界中容易被低估的一环，因为它不搬运数据，却能改变 CVM 控制流。"
  narrative:
  - "CVM 保护内存和 CPU state，但设备事件通过 interrupt controller 进入 execution path。"
  - "host 或 hypervisor 如果能任意配置 virtual interrupt，就可能诱导 CVM 执行错误路径。"
  - "传统 device passthrough 关注 DMA isolation，未必验证 interrupt authenticity 和 ordering。"
  - "Devlore 因此把 interrupt lifecycle 作为独立保护对象。"
  evidence_refs:
  - "Devlore p.1 introduction: attacks via malicious interrupts against CVMs."
  - "Devlore Fig.3-Fig.4: hypervisor GIC configuration flow and registered interrupt ordering."
  proof_object:
    type: comparison_matrix
    title: "interrupt protection 关注点"
    data:
      columns: ["风险", "表现", "Devlore 方向"]
      rows:
      - ["forged interrupt", "host 注入不存在事件", "绑定物理和虚拟中断"]
      - ["misconfiguration", "GIC/vGIC 配置被操纵", "monitor 记录和检查"]
      - ["ordering issue", "事件顺序影响 handler", "维护 ordered physical list"]
      - ["compatibility", "device driver 仍需工作", "评估 GPU/driver 场景"]
  source_note: "矩阵依据 Figure 3、Figure 4 和 threat discussion。"

- slide_id: d05-08-devlore-solution
  paper_key: bertschi2026devlore
  slide_type: solution
  claim: "Devlore 的设计把中断注册、GIC 配置和虚拟中断注入拆成可检查步骤。"
  narrative:
  - "CVM 先注册可接受的 device interrupts。"
  - "monitor/RMM 记录到达的 physical interrupts 并检查它们是否属于已注册集合。"
  - "virtual interrupt 只有在与 physical interrupt 绑定后才交给 CVM。"
  - "Table 1 总结了 Devlore 新增和复用的 device lifecycle API。"
  evidence_refs:
  - "Devlore Fig.2-Fig.4: design, GIC configuration flow, registered interrupt list."
  - "Devlore Table 1: new and existing API for device lifecycle."
  proof_object:
    type: mechanism_flow
    title: "Devlore interrupt flow"
    data:
      stages:
      - "CVM registers device IRQ"
      - "hypervisor config request"
      - "monitor records physical IRQ"
      - "RMM verifies binding"
      - "virtual IRQ delivered to CVM"
  source_note: "流程按 Figure 2-Figure 4 和 Table 1 重绘。"

