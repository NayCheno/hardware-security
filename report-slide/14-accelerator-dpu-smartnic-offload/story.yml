- slide_id: d14-12-cage-background
  paper_key: wang2026cage
  slide_type: background
  claim: "CAGE 的背景问题是 Arm CCA 保护 Realm，但现有 hardware/firmware 并不直接支持 confidential accelerator workloads。"
  narrative:
  - "CCA 提供 Realm 隔离，但 accelerator tasks 通常需要 device memory、MMIO 和 task queue。"
  - "现有研究可能 TCB 大、硬件不兼容或不适配 Arm CCA workflow。"
  - "FPGA/GPU 等 accelerator 的 buffer-channel relation 需要与 GPT 权限同步。"
  - "CAGE 因此把 accelerator workflow 重新映射到 CCA 机制。"
  evidence_refs:
  - "CAGE p.1 abstract: hardware and firmware supporting confidential accelerator workloads remain unavailable."
  - "CAGE Fig.3-Fig.4: GPT configurations and GPT synchronization optimization."
  proof_object:
