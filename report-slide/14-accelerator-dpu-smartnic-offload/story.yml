      - ["accelerator task", "非原生对象", "shadow task"]
      - ["GPT sync", "需要状态切换", "optimization"]
      - ["FPGA/GPU workflow", "不自动可信", "workflow adaptation"]
  source_note: "矩阵依据 CAGE 摘要和 Figure 3-Figure 4。"

