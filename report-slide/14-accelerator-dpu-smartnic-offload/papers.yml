    background:
      claim: CPU TEE 不能天然保护 accelerator offload path，敏感数据进入 GPU、driver、PCIe fabric 或 r。
      points:
      - CPU TEE 不能天然保护 accelerator offload path，敏感数据进入 GPU、driver、PCIe fabric 或 remote resource pool 后仍可能暴露
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: Security Controller 作为 thin TCB 管理 accelerator assignment、加密认证、remote att。
      points:
      - Security Controller 作为 thin TCB 管理 accelerator assignment、加密认证、remote attestation、secure cleanup 和资源回收
      visual:
        title: 关键机制
        items:
        - Rack-level Security Controller
        - PCIe ExpressFabric accelerator assignment
        - Remote attestation and secure cleanup lifecycle
    experiments:
      claim: 真实硬件原型
      points:
      - 真实硬件原型
      - 论文报告 ResNet152 inference 最大 throughput overhead 2.17%，training 最大 overhead 0.95%
      visual:
        title: 证据强度
        items:
        - 类型：E1 peer-reviewed primary work
        - 成熟度：peer-reviewed primary work
        - PDF：local_pdf_verified
    evaluation:
      claim: accelerator confidential offload 的 foundational baseline，说明 CPU TEE 边界可以被。
      strengths: accelerator confidential offload 的 foundational baseline，说明 CPU TEE 边界可以被 rack-level controller 扩展。
      limitations: 早于 SPDM/TDISP/CoVE-IO，不能当作 modern trusted I/O 标准或 vendor DPU attestation proof。
      commercialization: 适合启发 DPU/SmartNIC security-controller 设计；风险在集中 TCB、设备固件可信和 production lifecycle 复杂度。
