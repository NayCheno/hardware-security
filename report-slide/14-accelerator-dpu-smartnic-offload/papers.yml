  title: 'HETEE: rack-scale heterogeneous TEE'
  auxiliary: []
  slides:
    summary:
      claim: HETEE 用 rack-level security controller 与 PCIe fabric 动态隔离 GPU/FPGA/TPU 等。
      points:
      - HETEE 用 rack-level security controller 与 PCIe fabric 动态隔离 GPU/FPGA/TPU 等 accelerator
