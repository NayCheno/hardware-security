- slide_id: d12-15-odrp-evaluation
  paper_key: wang2025odrp
  slide_type: evaluation
  claim: "ODRP 很适合说明 SmartNIC/RNIC 可成为 memory-management actor，但它也暴露了 endpoint trust 和 state recovery 的新边界。"
  narrative:
  - "优点：问题定义清晰，真正把 allocation/deallocation 从 control path 推到 data path，且用 commodity RDMA hardware。"
  - "不足：WR-chain 编程复杂，empty free queue、CNode crash、TT recovery 等 corner cases 仍需 MNode CPU 或额外 recovery 逻辑。"
  - "商业潜力：适合 remote memory、SmartNIC/DPU offload 和低 CPU memory pooling 场景。"
  - "安全边界：论文不提供 attested endpoint、encrypted link、buffer revocation policy、trusted vNIC/vSwitch 或 confidential VM ownership 证明。"
  evidence_refs:
  - "ODRP p.6 Section 4.5: empty free page queue and crashed CNode handling."
  - "ODRP p.11 Section 6: extensibility, memory overhead, limitations of WR chain offloading."
  - "ODRP p.11 conclusion: nearly zero remote CPU usage, high utilization, low overhead."
  proof_object:
    type: comparison_matrix
    title: "落地潜力与安全边界"
    data:
      columns: ["维度", "判断"]
      rows:
      - ["最强贡献", "RNIC data path 同时处理 memory access 和 management"]
      - ["工程复杂度", "WR chain、EndianSwap、Modulo、recycle、crash recovery"]
      - ["可落地场景", "remote memory pool、SmartNIC/DPU offload、CPU-light MNode"]
      - ["安全缺口", "endpoint identity、link encryption、attestation、buffer lifecycle"]
  source_note: "评价依据 ODRP Section 4.5、Section 6、conclusion 与本仓库 confidential-I/O 证据边界。"

- slide_id: d12-16-direction-summary
  paper_key: direction
  slide_type: direction_summary
  claim: "三篇论文共同说明 data path 已经从本地 DRAM 扩展到 CXL/RDMA fabric；下一步安全问题是证明这个 fabric path 可信。"
  narrative:
  - "DirectCXL 优化 latency：把远端内存访问从 copy/runtime path 改成 CXL.mem address path。"
  - "CXL-Tiers 优化 VM resource management：用硬件 tiering 处理 cache-line hotness，用 Memstrata 管 outlier VM。"
  - "ODRP 优化 utilization 与 MNode CPU：用 RNIC WR chain 做 page-granular remote memory management。"
  - "这些都还缺 confidential I/O 组合证据：CXL IDE/PCIe IDE、SPDM/TDISP、device attestation、CCA/CoVE memory ownership 与 verifier policy。"
