  - "ODRP p.3-p.5 Figure 3-Figure 6: system architecture, data structures, WR chain design."
  - "ODRP p.4 Table 2: frontswap API mapped to RNIC implemented functions."
  - "ODRP p.5 Section 4.3-4.4: client-assisted TT address calculation and mapped/unmapped store split."
  proof_object:
