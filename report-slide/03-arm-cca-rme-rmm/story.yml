- slide_id: d03-12-rmmspec-background
  paper_key: arm_rmm_spec
  slide_type: background
  claim: "RMM 的必要性来自 CCA 的基本分工：host 能管理资源，但 Realm 关键状态必须由更小、更可信的组件 mediation。"
  narrative:
  - "如果 host 直接管理 Realm lifecycle，就会重新成为 tenant 的强 TCB。"
  - "RMM 位于更高特权和 Realm world 语义中，承担 Realm 创建、运行、内存转换等管理入口。"
  - "RMM 规范因此是 CCA 可信边界的核心文档。"
  - "但本 deck 对细节的讲解仍以 Li 2022 本地 PDF 为主。"
  evidence_refs:
  - "RMM spec README Paper Review p.1: official RMM source-page evidence with local PDF unavailable."
  - "Li 2022 p.1 abstract and Section 3: RMM firmware runs at higher privilege and protects Realms."
  proof_object:
    type: comparison_matrix
    title: "为什么需要 RMM"
    data:
      columns: ["操作", "host 直接做的问题", "RMM mediation 的作用"]
      rows:
      - ["create Realm", "host 可伪造初始状态", "检查 lifecycle"]
      - ["map memory", "host 可破坏 ownership", "约束 granule transition"]
      - ["run Realm", "host 可窥视状态", "隔离 execution state"]
      - ["attestation", "host 可影响 evidence", "绑定可信测量"]
  source_note: "表格结合 Li 2022 对 RMM 的机制描述和 RMM README 的规范定位。"

