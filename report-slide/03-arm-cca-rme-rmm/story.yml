direction: "Arm CCA / RME / RMM 基础架构"
story_version: 1
slides:
- slide_id: d03-00-direction-intro
  paper_key: direction
  slide_type: direction_intro
  claim: "Arm CCA 主线要围绕 Realm、RME、RMM 和 granule lifecycle，而不是把它写成 TrustZone 的新名字。"
  narrative:
  - "Li 2022 OSDI 论文是 peer-reviewed 系统入口，解释 CCA 为什么要让 untrusted host 继续管理资源但不能读写 Realm。"
  - "Arm CCA 官方规范是 E0 规范入口，但本仓库只有 source-page evidence，不能补写不可复核细节。"
  - "RMM 规范定义 Realm 管理和 lifecycle 语义，本仓库同样只有公开 source-page/README 证据。"
  - "三者共同建立 CCA 的可信边界：机制由论文讲，标准语义由规范限定，细节只写可复核部分。"
  evidence_refs:
  - "survey/evidence_ledger.md Slide Primary Ledger, 03-arm-cca-rme-rmm."
  - "Li 2022 p.1 abstract; Arm CCA spec README; RMM spec README."
  proof_object:
    type: evolution_timeline
    title: "CCA 基础证据层"
    data:
      steps:
      - label: "OSDI 2022"
        claim: "CCA/RME/RMM peer-reviewed design"
        evidence: "Li 2022"
      - label: "Arm CCA spec"
        claim: "Realm model official source"
        evidence: "source page only"
      - label: "RMM spec"
        claim: "Realm lifecycle manager"
        evidence: "source page only"
  source_note: "本页严格区分本地 PDF 证据和 source-page-only 规范证据。"

- slide_id: d03-01-li2022cca-summary
  paper_key: li2022cca
  slide_type: summary
  claim: "Li 2022 CCA 论文的核心是让 host 保留资源管理能力，同时用 RME/RMM 阻止它破坏 Realm 机密性和完整性。"
  narrative:
  - "论文提出 Arm CCA，提供 Realm 作为对 privileged system software 不透明的 secure execution environment。"
  - "它引入 Realm Management Monitor，host 可以请求创建和运行 Realm，但 RMM 保护 Realm 状态。"
  - "granule protection table 和 physical address space 语义让内存所有权成为硬件检查对象。"
  - "它是本报告 CCA 基础架构的一手系统论文。"
  evidence_refs:
  - "Li 2022 p.1 abstract: CCA provides Realms opaque to untrusted OSes and hypervisors."
  - "Li 2022 Table 1: CCA access control policy for granules and security states."
  proof_object:
    type: mechanism_flow
    title: "CCA 核心对象"
    data:
      stages:
      - "host 请求管理 Realm"
      - "RMM 运行在更高特权 Realm world"
      - "GPT 记录 granule ownership"
      - "RME 执行访问检查"
      - "Realm 执行 tenant workload"
  source_note: "机制图按论文摘要、RMM 描述和 Table 1 access-control policy 重绘。"

- slide_id: d03-02-li2022cca-background
  paper_key: li2022cca
  slide_type: background
  claim: "CCA 要解决的矛盾是云平台仍要管理硬件资源，但 tenant 不再愿意信任 hypervisor 和 host OS。"
  narrative:
  - "敏感数据越来越多地运行在 commodity cloud provider 上。"
  - "传统虚拟化把 hypervisor 作为强 TCB，但 hypervisor/OS 代码量大且漏洞多。"
  - "完全移除 host 管理能力又不现实，因为云平台仍需调度 CPU、内存和设备。"
  - "CCA 的设计点是在资源管理与安全隔离之间划边界。"
  evidence_refs:
  - "Li 2022 p.1 introduction: sensitive private data and untrusted privileged system software."
  - "Li 2022 Section 2: background on CCA/RME/RMM resource management split."
  proof_object:
    type: comparison_matrix
    title: "传统 VM 与 Realm 的信任差异"
    data:
      columns: ["对象", "传统 VM", "CCA Realm"]
      rows:
      - ["host OS/hypervisor", "可信管理者", "不可信资源管理者"]
      - ["tenant memory", "host 可管理且可观察", "host 管理但不能直接访问"]
      - ["firmware/monitor", "平台启动辅助", "RMM 成为隔离 enforcement TCB"]
      - ["安全目标", "虚拟化隔离", "机密性和完整性隔离"]
  source_note: "对比依据论文 introduction 对 untrusted privileged software 的问题设定。"

- slide_id: d03-03-li2022cca-solution
  paper_key: li2022cca
  slide_type: solution
  claim: "CCA 的机制关键是 granule ownership 与 RMM mediation，把 host 操作变成受检查的 lifecycle 请求。"
  narrative:
  - "内存以 granule 为基本管理单位，不同 physical address space 表示不同安全状态。"
  - "host 不能直接改变 Realm 受保护状态，而要通过 RMI 调 RMM。"
  - "Realm 内软件通过 RSI 与 RMM 交互，避免把 host 放回 trusted path。"
  - "论文还强调 verification，说明 CCA 设计不仅是接口集合，也需要可验证的访问控制不变量。"
  evidence_refs:
  - "Li 2022 Section 3: CCA design with Realm, RMM, RMI and RSI."
  - "Li 2022 Table 1: access control policy over granules and security state."
  proof_object:
    type: path_compare
    title: "两条接口路径"
    data:
      paths:
      - label: "host path"
        steps: ["host/hypervisor", "RMI call", "RMM check", "granule lifecycle update"]
        note: "资源管理被 RMM mediation"
      - label: "realm path"
        steps: ["Realm payload", "RSI call", "RMM service", "attestation/lifecycle response"]
        note: "tenant 不直接信任 host"
  source_note: "接口路径依据论文对 RMI/RSI 和 granule access policy 的描述重绘。"

- slide_id: d03-04-li2022cca-experiments
  paper_key: li2022cca
  slide_type: experiments
  claim: "Li 2022 的证据重点是设计与验证，而不是把 CCA 当成完整商用性能评测。"
  narrative:
  - "论文题目明确包含 Design and Verification，核心证据之一是 CCA 访问控制和组件验证。"
  - "它能支撑 CCA/RME/RMM 机制边界和不变量讨论。"
  - "不能把它扩展成所有 Arm CCA 产品、I/O 或 accelerator 场景已经安全。"
  - "后续 I/O/accelerator 章节必须引用 ACAI、Devlore、CAGE 等补充材料。"
  evidence_refs:
  - "Li 2022 title and p.1 abstract: Design and Verification of Arm CCA."
  - "Li 2022 Table 1 and verification sections: access-control policy and verification focus."
  proof_object:
    type: evidence_gap_matrix
    title: "Li 2022 可支撑的 claim"
    data:
      columns: ["可支撑", "不能外推"]
      rows:
      - ["Realm/RMM/GPT 基础机制", "所有 CCA 部署安全"]
      - ["host 与 Realm 权限边界", "device assignment 已安全"]
      - ["设计验证思路", "商业 silicon 行为"]
  source_note: "本页按 E1 system evidence 使用，不外推到 I/O 或商用部署。"

- slide_id: d03-05-li2022cca-evaluation
  paper_key: li2022cca
  slide_type: evaluation
  claim: "这篇论文把 CCA 的关键抽象讲清楚，但它只是基础架构入口，不覆盖后续所有部署和设备问题。"
  narrative:
  - "优点是把 host resource management 与 Realm protection 的分工讲得清晰。"
  - "不足是设备、interrupt、accelerator、container/user-space 等扩展不是主贡献。"
  - "商业潜力来自云 confidential VM 的清晰边界和 Arm 生态标准化路径。"
  - "落地风险在 RMM TCB、firmware update、ABI 兼容和跨设备 data path。"
  evidence_refs:
  - "Li 2022 Section 3-5: CCA design, RMM and verification."
  - "survey/evidence_ledger.md Boundary Records for Arm CCA and I/O-related directions."
  proof_object:
    type: comparison_matrix
    title: "评价"
    data:
      columns: ["维度", "判断"]
      rows:
      - ["强项", "Realm/RMM/granule ownership 基础清楚"]
      - ["短板", "不覆盖 trusted I/O 和细粒度部署全部问题"]
      - ["落地价值", "云 confidential VM 的 Arm 标准路径"]
      - ["风险", "RMM TCB 与 lifecycle/ABI 管理"]
  source_note: "评价基于论文范围和本报告后续方向的证据分工。"

- slide_id: d03-06-armccaspec-summary
  paper_key: arm_cca_spec
  slide_type: summary
  claim: "Arm CCA 规范是 Realm 模型的官方语义来源，但本仓库只有 source-page evidence，不能写不可复核的细节。"
  narrative:
  - "README 记录 official Arm documentation page 已验证，但本地 PDF 不可用。"
  - "因此它可以支撑 Arm CCA 规范存在、官方来源和高层 Realm model。"
  - "它不能支撑细粒度 ABI、私有状态机或未公开下载材料中的细节。"
  - "本 deck 对它的使用必须比对 Li 2022 和 RMM README。"
  evidence_refs:
  - "Arm CCA spec README p.1 metadata: official Arm documentation page verified, local PDF unavailable."
  - "Arm CCA spec README Paper Review: use only public architecture concepts and avoid unavailable non-public details."
  proof_object:
    type: evidence_gap_matrix
    title: "source-page-only 规范边界"
    data:
      columns: ["可以写", "不能写"]
      rows:
      - ["官方 CCA 规范入口", "不可复核 ABI 细节"]
      - ["Realm 高层概念", "私有状态机推断"]
      - ["E0 source status", "本地 PDF 页码内容"]
  source_note: "本页完全依据 README evidence-status record，不补写缺失 PDF 内容。"

