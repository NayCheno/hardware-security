  - "Arm CCA 规范的官方来源意味着它是 E0 spec evidence。"
  - "但本地 PDF 不可用会限制我们引用页码、表格和状态机。"
  - "所以 slide 里要写 source_verified_pdf_unavailable，而不是假装有完整 PDF。"
  evidence_refs:
