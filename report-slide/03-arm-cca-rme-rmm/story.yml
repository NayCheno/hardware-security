  - "它维护或检查与 granule ownership、Realm state、measurement 相关的安全不变量。"
  - "它把 host 的管理意图转化为受限状态转换。"
  - "本页讲的是角色模型，不写不可复核的 RMM ABI 字段。"
  evidence_refs:
