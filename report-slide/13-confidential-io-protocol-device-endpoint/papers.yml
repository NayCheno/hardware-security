  - pcisig_tdisp_xt_2025
  slides:
    summary:
      claim: CoVE-IO 把 TVM trusted I/O 拆成 TDI/TDM/DSM、SPDM、TDISP、PCIe IDE、IOMMU、truste。
      points:
      - CoVE-IO 把 TVM trusted I/O 拆成 TDI/TDM/DSM、SPDM、TDISP、PCIe IDE、IOMMU、trusted MSI 和 CoVE ABI
      visual:
        title: 证据定位
        items:
        - 槽位：primary_2
        - 类型：spec
        - 证据：E3 / Draft-not-ratified
        - 来源：local_pdf_verified
    background:
      claim: TVM/Realm 使用设备时，需要把 device interface identity、DMA/MMIO、interrupt delivery。
      points:
      - TVM/Realm 使用设备时，需要把 device interface identity、DMA/MMIO、interrupt delivery 和 PCIe/CXL link 放到同一边界
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 用 CoVE-IO draft 描述 RISC-V confidential I/O lifecycle
      points:
      - 用 CoVE-IO draft 描述 RISC-V confidential I/O lifecycle
      - TDISP/TDISP XT 只作为公开 metadata 辅助，不推断 gated normative rules
      visual:
        title: 关键机制
        items:
        - TDI/TDM/DSM and TSM/RDSM lifecycle
        - SPDM plus TDISP plus PCIe IDE composition
        - IOMMU/IOPMP/AIA trusted DMA and interrupt substrate
    experiments:
      claim: 规范/Survey，无新实验
      points:
      - 规范/Survey，无新实验
      - CoVE-IO 是 draft，TDISP/TDISP XT PDF member-gated，只能写 public metadata 和 high-level lifecycle role
      visual:
        title: 证据强度
        items:
        - 类型：E3 draft/preprint, not ratified
        - 成熟度：draft/preprint, not ratified
        - PDF：local_pdf_verified
    evaluation:
      claim: 给 RISC-V TVM trusted I/O 提供最完整的公开 draft 架构入口
      strengths: 给 RISC-V TVM trusted I/O 提供最完整的公开 draft 架构入口。
      limitations: v0.3.0 未 ratified，TDISP/XT 规范不可公开复核，不能写成 production CoVE-IO stack。
      commercialization: 指向 vendor NIC/DPU/accelerator assignment；风险在 SPDM证书、TDISP state、IDE key、ATS/PRI 和 revocation。
- key: li2024folio
  role: sota_2
  selection_slot: primary_3
  paper_type: system
  claim_strength: E3
  selection_reason: FOLIO is treated as a draft SOTA design exploration for confidential I/O protocol and endpoints.
  evidence_type: E3 draft/preprint, not ratified
  maturity: draft/preprint, not ratified
