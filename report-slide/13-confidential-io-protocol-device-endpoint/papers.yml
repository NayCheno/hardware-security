direction: Confidential I/O protocol、trusted device interface、network endpoint
focus: 把 SPDM/TDISP/PCIe IDE/attested TLS 与 trusted device lifecycle 组合起来写。
selection_rule: 固定三篇 primary；TLS+RA 作为 endpoint/channel-binding 主证据，FOLIO、SEV-TIO、TDISP/TDISP XT 和 BlueField DPU evidence 为 auxiliary/contrast。
primary:
- key: dmtf_spdm_2025
  role: spec_foundation
  selection_slot: primary_1
  paper_type: spec
  claim_strength: E0
  selection_reason: SPDM is the first-party specification foundation for device identity, measurement, and secure sessions.
  evidence_type: E0 official standard/specification
  maturity: official standard/specification
  pdf_status: local_pdf_verified
  source_url: https://www.dmtf.org/dsp/DSP0274
  evidence: E0 / Spec-standard SOTA
  source_status: local_pdf_verified
  reference: reference/memory-and-io-fabrics/security-protocol-and-data-model-spdm-specification/paper.pdf
  title: SPDM device identity and measurement
  auxiliary:
  - dmtf_spdm_arch_2024
  - dmtf_spdm_secured_messages_2025
  - dmtf_spdm_tcp_2024
  slides:
    summary:
      claim: SPDM 定义 device/component identity、measurement、capability negotiation、cert。
      points:
      - SPDM 定义 device/component identity、measurement、capability negotiation、certificate/challenge 和 key exchange
      visual:
        title: 证据定位
        items:
        - 槽位：primary_1
        - 类型：spec
        - 证据：E0 / Spec-standard SOTA
        - 来源：local_pdf_verified
    background:
      claim: Confidential workload 使用真实设备时，不能只相信 host 枚举出的 PCIe requester ID、VF 配置或驱动状态
      points:
      - Confidential workload 使用真实设备时，不能只相信 host 枚举出的 PCIe requester ID、VF 配置或驱动状态
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 通过 requester/responder 协议、certificate chain、measurement blocks、transcript。
      points:
      - 通过 requester/responder 协议、certificate chain、measurement blocks、transcript 和 secured session 建立 device trust control
        plane
      visual:
        title: 关键机制
        items:
        - Device certificate and measurement retrieval
        - Challenge-response and transcript binding
        - Key exchange for secured control messages
    experiments:
      claim: 规范/Survey，无新实验
      points:
      - 规范/Survey，无新实验
      - 它证明协议语义，不证明设备内部隔离、DMA、interrupt 或 data path 已安全
      visual:
        title: 证据强度
        items:
        - 类型：E0 official standard/specification
        - 成熟度：official standard/specification
        - PDF：local_pdf_verified
    evaluation:
      claim: 是 CoVE-IO、TDISP、PCIe IDE keying 和 vendor device attestation 的共同 device-ev。
      strengths: 是 CoVE-IO、TDISP、PCIe IDE keying 和 vendor device attestation 的共同 device-evidence 底座。
      limitations: 单独成功的 SPDM session 不能证明 TDI state、IOMMU/IOPMP policy、IDE link 或 device firmware 隔离正确。
      commercialization: 适合 fleet-scale device attestation；风险在证书供应链、measurement schema 和 firmware update policy。
- key: riscv_cove_io_2026
  role: draft_trusted_io_lifecycle
  selection_slot: primary_2
  paper_type: spec
  claim_strength: E3
  selection_reason: RISC-V CoVE-IO draft maps SPDM and TDISP-style ideas into the RISC-V TEE-I/O track.
  evidence_type: E3 draft/preprint, not ratified
  maturity: draft/preprint, not ratified
  pdf_status: local_pdf_verified
  source_url: https://github.com/riscv-non-isa/riscv-ap-tee-io/releases/tag/v0.3.0
  evidence: E3 / Draft-not-ratified
  source_status: local_pdf_verified
  reference: reference/risc-v-confidential-computing/risc-v-cove-io-specification/paper.pdf
  title: CoVE-IO and TDISP trusted-device lifecycle
  auxiliary:
  - pcisig_tdisp_2022
  - pcisig_tdisp_xt_2025
  slides:
    summary:
      claim: CoVE-IO 把 TVM trusted I/O 拆成 TDI/TDM/DSM、SPDM、TDISP、PCIe IDE、IOMMU、truste。
      points:
      - CoVE-IO 把 TVM trusted I/O 拆成 TDI/TDM/DSM、SPDM、TDISP、PCIe IDE、IOMMU、trusted MSI 和 CoVE ABI
      visual:
        title: 证据定位
        items:
        - 槽位：primary_2
        - 类型：spec
        - 证据：E3 / Draft-not-ratified
        - 来源：local_pdf_verified
    background:
      claim: TVM/Realm 使用设备时，需要把 device interface identity、DMA/MMIO、interrupt delivery。
      points:
      - TVM/Realm 使用设备时，需要把 device interface identity、DMA/MMIO、interrupt delivery 和 PCIe/CXL link 放到同一边界
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 用 CoVE-IO draft 描述 RISC-V confidential I/O lifecycle
      points:
      - 用 CoVE-IO draft 描述 RISC-V confidential I/O lifecycle
      - TDISP/TDISP XT 只作为公开 metadata 辅助，不推断 gated normative rules
      visual:
        title: 关键机制
        items:
        - TDI/TDM/DSM and TSM/RDSM lifecycle
        - SPDM plus TDISP plus PCIe IDE composition
        - IOMMU/IOPMP/AIA trusted DMA and interrupt substrate
    experiments:
      claim: 规范/Survey，无新实验
      points:
      - 规范/Survey，无新实验
      - CoVE-IO 是 draft，TDISP/TDISP XT PDF member-gated，只能写 public metadata 和 high-level lifecycle role
      visual:
        title: 证据强度
        items:
        - 类型：E3 draft/preprint, not ratified
        - 成熟度：draft/preprint, not ratified
        - PDF：local_pdf_verified
    evaluation:
      claim: 给 RISC-V TVM trusted I/O 提供最完整的公开 draft 架构入口
      strengths: 给 RISC-V TVM trusted I/O 提供最完整的公开 draft 架构入口。
      limitations: v0.3.0 未 ratified，TDISP/XT 规范不可公开复核，不能写成 production CoVE-IO stack。
      commercialization: 指向 vendor NIC/DPU/accelerator assignment；风险在 SPDM证书、TDISP state、IDE key、ATS/PRI 和 revocation。
- key: weinhold2025tlsra
  role: endpoint_channel_binding_primary
  selection_slot: primary_3
  paper_type: system
  claim_strength: E1
  selection_reason: Peer-reviewed endpoint/channel-binding evidence for integrating remote attestation into TLS.
  evidence_type: E1 peer-reviewed primary paper
  maturity: peer-reviewed primary paper
  pdf_status: local_pdf_verified
  source_url: https://www.usenix.org/conference/atc25/presentation/weinhold
  evidence: E1 / Peer-reviewed endpoint channel-binding evidence
  source_status: local_pdf_verified
  reference: reference/attestation/separate-but-together-integrating-remote-attestation-into-tls/paper.pdf
  title: 'Separate but Together: TLS channel binding with remote attestation'
  auxiliary:
  - li2024folio
  - amd_sev_tio_2023
  - nvidia_bluefield_operation_2025
  slides:
    summary:
      claim: TLS+RA binds an application secure channel to an attested TEE endpoint, anchoring endpoint/channel-binding evidence.
      points:
      - Binds an application secure channel to an attested TEE endpoint
      - Anchors endpoint/channel-binding evidence
      visual:
        title: Evidence position
        items:
        - 'slot: primary_3'
        - 'type: system'
        - 'evidence: E1 / Peer-reviewed endpoint channel-binding evidence'
        - 'source: local_pdf_verified'
    background:
      claim: SPDM and TDISP can identify device/control-plane state, but they do not prove where an application TLS channel
        terminates.
      points:
      - SPDM and TDISP identify device/control-plane state
      - Application TLS needs binding to attestation evidence and workload identity
      visual:
        title: Problem boundary
        items:
        - TEE endpoint identity
        - TLS transcript binding
        - verifier/relying-party policy
    solution:
      claim: Integrate remote-attestation evidence into the TLS handshake or certificate path so the channel and TEE state
        are verified together.
      points:
      - Integrate remote-attestation evidence into TLS
      - Bind channel endpoint, TEE measurement, and verifier policy
      visual:
        title: Mechanism view
        items:
        - TLS endpoint and attestation binding
        - certificate/evidence composition
        - relying-party verification policy
    experiments:
      claim: USENIX ATC 2025 peer-reviewed system paper provides a TLS+RA prototype and evaluation.
      points:
      - USENIX ATC 2025 peer-reviewed prototype and evaluation
      - Supports endpoint/channel binding, not SPDM/TDISP device identity or DMA protection
      visual:
        title: Evidence strength
        items:
        - 'type: E1 peer-reviewed primary paper'
        - 'maturity: peer-reviewed primary paper'
        - 'PDF: local_pdf_verified'
    evaluation:
      claim: Fits the protocol/device-endpoint primary slot better than FOLIO, which is a trusted-I/O contrast paper.
      strengths: Fits the protocol/device-endpoint primary slot better than FOLIO, which is a trusted-I/O contrast paper.
      limitations: TLS+RA does not solve device assignment, TDISP state, IDE link protection, or IOMMU/IOPMP policy.
      commercialization: Useful for confidential service onboarding and key release; risks remain in certificates, evidence
        profiles, and verifier UX.
