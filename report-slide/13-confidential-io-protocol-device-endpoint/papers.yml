direction: Confidential I/O protocol、trusted device interface、network endpoint
focus: 把 SPDM/TDISP/PCIe IDE/attested TLS 与 trusted device lifecycle 组合起来写。
selection_rule: 固定三篇 primary；SPDM 辅助规范、TDISP/TDISP XT、SEV-TIO、TLS+RA 和 BlueField DPU evidence 均为 auxiliary。
primary:
- key: dmtf_spdm_2025
  role: foundational
  selection_slot: primary_1
  paper_type: spec
  claim_strength: E0
  selection_reason: SPDM is the first-party specification foundation for device identity, measurement, and secure sessions.
  evidence_type: E0 official standard/specification
  maturity: official standard/specification
  pdf_status: local_pdf_verified
  source_url: https://www.dmtf.org/dsp/DSP0274
  evidence: E0 / Spec-standard SOTA
  source_status: local_pdf_verified
  reference: reference/memory-and-io-fabrics/security-protocol-and-data-model-spdm-specification/paper.pdf
  title: SPDM device identity and measurement
  auxiliary:
  - dmtf_spdm_arch_2024
  - dmtf_spdm_secured_messages_2025
  - dmtf_spdm_tcp_2024
  slides:
    summary:
      claim: SPDM 定义 device/component identity、measurement、capability negotiation、cert。
      points:
      - SPDM 定义 device/component identity、measurement、capability negotiation、certificate/challenge 和 key exchange
      visual:
        title: 证据定位
        items:
        - 槽位：primary_1
        - 类型：spec
        - 证据：E0 / Spec-standard SOTA
        - 来源：local_pdf_verified
    background:
      claim: Confidential workload 使用真实设备时，不能只相信 host 枚举出的 PCIe requester ID、VF 配置或驱动状态
      points:
      - Confidential workload 使用真实设备时，不能只相信 host 枚举出的 PCIe requester ID、VF 配置或驱动状态
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 通过 requester/responder 协议、certificate chain、measurement blocks、transcript。
      points:
      - 通过 requester/responder 协议、certificate chain、measurement blocks、transcript 和 secured session 建立 device trust control
        plane
      visual:
        title: 关键机制
        items:
        - Device certificate and measurement retrieval
        - Challenge-response and transcript binding
        - Key exchange for secured control messages
    experiments:
      claim: 规范/Survey，无新实验
      points:
      - 规范/Survey，无新实验
      - 它证明协议语义，不证明设备内部隔离、DMA、interrupt 或 data path 已安全
      visual:
        title: 证据强度
        items:
        - 类型：E0 official standard/specification
        - 成熟度：official standard/specification
        - PDF：local_pdf_verified
    evaluation:
      claim: 是 CoVE-IO、TDISP、PCIe IDE keying 和 vendor device attestation 的共同 device-ev。
      strengths: 是 CoVE-IO、TDISP、PCIe IDE keying 和 vendor device attestation 的共同 device-evidence 底座。
      limitations: 单独成功的 SPDM session 不能证明 TDI state、IOMMU/IOPMP policy、IDE link 或 device firmware 隔离正确。
      commercialization: 适合 fleet-scale device attestation；风险在证书供应链、measurement schema 和 firmware update policy。
- key: riscv_cove_io_2026
  role: sota_1
  selection_slot: primary_2
  paper_type: spec
  claim_strength: E3
  selection_reason: RISC-V CoVE-IO draft maps SPDM and TDISP-style ideas into the RISC-V TEE-I/O track.
  evidence_type: E3 draft/preprint, not ratified
  maturity: draft/preprint, not ratified
