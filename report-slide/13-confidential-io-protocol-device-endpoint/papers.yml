  slides:
    summary:
      claim: FOLIO 研究不信任 I/O device 时 confidential VM 的高性能网络路径，是 trusted I/O 不是唯一网络答案的。
      points:
      - FOLIO 研究不信任 I/O device 时 confidential VM 的高性能网络路径，是 trusted I/O 不是唯一网络答案的反例
      visual:
        title: 证据定位
        items:
        - 槽位：primary_3
        - 类型：system
        - 证据：E3 / Draft-not-ratified
        - 来源：local_pdf_verified
    background:
      claim: 网络流量通常已有端到端加密
      points:
      - 网络流量通常已有端到端加密
      - 把 NIC 加入 TCB 可能带来 device ecosystem 和 verifier policy 成本
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 通过 DPDK/SNP 网络路径优化减少 shared/private transition 和 packet processing overhe。
      points:
      - 通过 DPDK/SNP 网络路径优化减少 shared/private transition 和 packet processing overhead，同时保持 NIC outside TCB
      visual:
        title: 关键机制
        items:
        - SEV-SNP CVM networking path analysis
        - DPDK data-plane optimization
        - Trusted-I/O versus untrusted-device tradeoff
    experiments:
      claim: arXiv preprint 提供 SEV-SNP/DPDK 网络路径原型评估，报告接近理想 TIO 网络配置
      points:
      - arXiv preprint 提供 SEV-SNP/DPDK 网络路径原型评估，报告接近理想 TIO 网络配置
      - 结论不能泛化到 plaintext accelerator、storage 或 RDMA offload
      visual:
        title: 证据强度
        items:
        - 类型：E3 draft/preprint, not ratified
        - 成熟度：draft/preprint, not ratified
        - PDF：local_pdf_verified
    evaluation:
      claim: 防止把 SPDM/TDISP/IDE 写成所有网络性能问题的唯一答案
      strengths: 防止把 SPDM/TDISP/IDE 写成所有网络性能问题的唯一答案。
      limitations: 基于 SEV-SNP 网络场景，不证明 Arm CCA/CoVE、SmartNIC/DPU 或 storage offload 的同等安全/性能。
      commercialization: 对 CVM networking 软件路径有现实意义；风险在明文 offload、TLS termination 和 secure vNIC/vSwitch production evidence
        不足。
