  role: taxonomy_anchor
  selection_slot: primary_1
  paper_type: sok
  claim_strength: E2
  selection_reason: Peer-reviewed ASIA CCS 2024 SoK used as the main taxonomy anchor for TEE design choices and pitfalls.
  evidence_type: E2 peer-reviewed survey/SoK
  maturity: peer-reviewed survey/SoK
  pdf_status: local_pdf_verified
  source_url: https://dl.acm.org/doi/10.1145/3634737.3637642
  evidence: E2 / Peer-reviewed taxonomy anchor
  source_status: local_pdf_verified
  reference: reference/trusted-execution-environments/sok/understanding-design-choices-pitfalls-trusted-execution-environments/paper.pdf
  title: TEE design choices and pitfalls taxonomy
  auxiliary:
  - schneider2022soktee
  slides:
    summary:
      claim: Peer-reviewed SoK for TEE design choices, pitfalls, runtime lifecycle, and cross-platform taxonomy.
      points:
      - Peer-reviewed SoK for TEE design choices and pitfalls
      - Connects runtime lifecycle and cross-platform taxonomy
      visual:
        title: Evidence position
        items:
        - 'slot: primary_1'
        - 'type: sok'
        - 'evidence: E2 / Peer-reviewed taxonomy anchor'
        - 'source: local_pdf_verified'
    background:
      claim: TEE taxonomy should not be organized only by product name; each platform makes different launch, runtime, storage,
        I/O, and attestation choices.
      points:
      - TEE taxonomy should not be organized only by product name
      - Launch, runtime, storage, I/O, and attestation choices differ across platforms
      visual:
        title: Problem boundary
        items:
        - protected object
        - management boundary
        - method gap
    solution:
      claim: Use design-choice and pitfall taxonomy to connect SGX, SEV, TDX, CCA, CoVE, and RISC-V enclave lineage.
      points:
      - Use design-choice and pitfall taxonomy
      - Connect SGX, SEV, TDX, CCA, CoVE, and RISC-V enclave lineage
      visual:
        title: Mechanism view
        items:
        - launch/admission choices
        - runtime isolation and lifecycle
        - attestation, storage, I/O and verifier policy
    experiments:
      claim: SoK/survey with no new experiments (无新实验); supports taxonomy, coverage, and design-choice framing only.
      points:
      - SoK/survey with no new experiments (无新实验)
      - Mechanism claims still need original papers or specifications
      visual:
        title: Evidence strength
        items:
        - 'type: E2 peer-reviewed survey/SoK'
        - 'maturity: peer-reviewed survey/SoK'
        - 'PDF: local_pdf_verified'
    evaluation:
      claim: Best used as the peer-reviewed taxonomy anchor for the whole deck.
      strengths: Best used as the peer-reviewed taxonomy anchor for the whole deck.
      limitations: As a SoK, it does not replace platform papers, official specifications, or production evidence.
      commercialization: Useful as a platform design checklist; deployment still depends on implementation and verifier policy.
