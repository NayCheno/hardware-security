direction: 硬件辅助 TEE taxonomy
focus: 用 SoK/Survey 固定 design space，避免把 SGX、SEV、TrustZone、CCA、CoVE 和 accelerator TEE 混成产品罗列。
selection_rule: 固定三篇 primary；survey/SoK 只作为 taxonomy 和术语入口，不替代一手机制证据。
primary:
- key: schneider2022soktee
  role: Foundational / SoK
  evidence: E2 / Foundational
  source_status: local_pdf_verified
  reference: reference/trusted-execution-environments/sok/hardware-supported-trusted-execution-environments/paper.pdf
  title: 硬件辅助 TEE 总体设计空间
  summary: 系统化整理硬件辅助 TEE 的 launch、runtime isolation、trusted I/O、secure storage、attestation 与 TCB 维度。
  background: SGX、SEV、TrustZone、Sanctum、Keystone 等平台名称相似，但威胁模型、硬件假设和部署场景差异很大。
  insight_solution: 用机制级 taxonomy 替代产品级罗列，把不同 TEE 映射到可比较的安全属性。
  key_technologies:
  - launch 与初始化信任链
  - runtime isolation 与内存访问控制
  - trusted I/O、secure storage、attestation
  experiment_claim: Survey/SoK，无新实验；只能支撑分类、术语和覆盖范围。
  evaluation:
    strengths: 适合作为全 deck 的分类坐标。
    limitations: 时间截面停在 2022 年，不能覆盖 CCA、CoVE-IO 和 accelerator TEE 的最新机制。
    commercialization: 可帮助产品/平台做需求拆解和证据清单，但不能作为单个平台的安全证明。
  auxiliary: []
- key: boubakri2025riscvtee
  role: Background substrate / survey
  evidence: E2/E5 / Background substrate
  source_status: source_verified_pdf_limited
  reference: reference/risc-v-confidential-computing/a-survey-of-risc-v-secure-enclaves-and-trusted-execution-environments/README.md
  title: RISC-V secure enclave 与 TEE 谱系 survey
  summary: 梳理 RISC-V secure enclave 与 TEE 研究谱系。
  background: RISC-V TEE 从 PMP monitor 到 confidential VM 的发展分散在论文、草案和原型中，容易产生谱系断裂。
  insight_solution: 按 RISC-V TEE 设计点组织 Keystone、Penglai、SPEAR-V、CoVE 等工作，作为 taxonomy bridge。
  key_technologies:
  - PMP/enclave lineage
  - CoVE/AP-TEE confidential VM lineage
  - RISC-V open hardware/software co-design
  experiment_claim: Survey，无新实验；PDF/source-limited 时只写 taxonomy 辅助，不写强机制或性能 claim。
  evaluation:
    strengths: 能把 RISC-V 小方向和顶层 taxonomy 接起来。
    limitations: 机制细节必须回到 Keystone/Penglai/SPEAR-V/AP-TEE/CoVE-IO 原始材料。
    commercialization: 适合辅助平台选型；落地依赖 RISC-V 草案成熟度和厂商实现。
  auxiliary: []
- key: sok-tee
  role: Background substrate / accelerator TEE SoK
  evidence: E2 / Background substrate
  source_status: local_pdf_verified
  reference: reference/accelerator-tees/sok/analysis-accelerator-tee-designs/paper.pdf
  title: Accelerator TEE 设计空间
  summary: 系统化分析 accelerator TEE 设计。
  background: Confidential workload 依赖 GPU/NPU/DPU/SmartNIC 后，CPU TEE 边界无法单独覆盖数据路径。
  insight_solution: 把 accelerator TEE 拆成设备身份、内存/总线保护、runtime TCB、调度、attestation 等维度。
  key_technologies:
  - device identity and attestation
  - protected device memory and queue state
  - runtime/driver TCB and scheduling boundary
  experiment_claim: Survey/SoK，无新实验；只能支撑 accelerator/device TEE taxonomy。
  evaluation:
    strengths: 能把 I/O、accelerator、SmartNIC 小方向纳入同一比较框架。
    limitations: 不能替代 CCA、CoVE-IO、SPDM/TDISP 或具体 GPU/DPU 系统的一手证据。
    commercialization: 可转化为 DPU/GPU 安全产品评估清单；落地依赖设备 RoT 与标准接口。
  auxiliary: []
auxiliary: []
