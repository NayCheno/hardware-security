      - ["后续章节索引", "商业可部署性背书"]
  source_note: "无新实验；本页只写 E2 taxonomy claim。"

- slide_id: d01-15-accelteesok-evaluation
  paper_key: sok-tee
  slide_type: evaluation
  claim: "Accelerator TEE SoK 的价值是补齐非 CPU data path；局限是它仍需要和每个系统的一手证据配合；无新实验。"
