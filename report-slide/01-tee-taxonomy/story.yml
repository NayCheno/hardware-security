      - ["术语归类", "draft spec 成熟度判断替代品"]
  source_note: "无新实验；证据边界按 README review 和 evidence ledger 写入。"

- slide_id: d01-10-boubakri-evaluation
  paper_key: boubakri2025riscvtee
  slide_type: evaluation
  claim: "它是 RISC-V 线索的好目录，但需要和原文配套使用；无新实验。"
