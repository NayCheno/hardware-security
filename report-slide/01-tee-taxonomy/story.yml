      - ["短板", "机制细节必须回到原始材料"]
      - ["落地判断", "规范化路线仍在演进"]
      - ["汇报位置", "taxonomy 和 cross-check，不做机制 primary"]
  source_note: "评价基于本地 README review，不添加 survey 未证明的机制结论。"

- slide_id: d01-11-accelteesok-summary
  paper_key: sok-tee
  slide_type: summary
  claim: "Accelerator TEE SoK 把 taxonomy 从 CPU enclave 扩展到 GPU、DPU、NPU、SmartNIC 的计算和数据路径。"
  narrative:
  - "论文指出 accelerator TEE 已成为敏感高性能计算的重要方向，但现有研究往往绑定特定 CPU 或 accelerator。"
  - "它把 accelerator TEE 分成 Host-type、Acc.-type 和 Mix-type 等架构模式。"
  - "它还比较了 access control、memory encryption、runtime、attestation 等安全方案。"
  - "在本报告中，它是 05、14、15 的共同 taxonomy anchor。"
  evidence_refs:
  - "Accelerator TEE SoK p.1 abstract: analyzes accelerator TEE designs and need for standard criteria."
  - "Accelerator TEE SoK Fig.1 and Table II: Host-type, Acc.-type, Mix-type architecture overview."
  proof_object:
    type: comparison_matrix
    title: "accelerator TEE 三类架构"
    data:
      columns: ["类别", "可信边界", "典型风险"]
      rows:
      - ["Host-type", "host TEE 管 accelerator workflow", "device path 仍需保护"]
      - ["Acc.-type", "accelerator 内部有可信根", "硬件改造和生态成本高"]
      - ["Mix-type", "host/device 共同承担 TCB", "边界组合复杂"]
  source_note: "架构分类来自 Figure 1 和 Table II；本页不复用原图。"

- slide_id: d01-12-accelteesok-background
  paper_key: sok-tee
  slide_type: background
  claim: "只保护 CPU 内存并不能保护 accelerator workload，因为敏感数据会进入 DMA、device memory 和 accelerator runtime。"
  narrative:
  - "AI、图计算、网络和存储卸载会把秘密模型、输入数据和中间结果送到 accelerator。"
  - "传统 CPU TEE 的安全边界经常止于 CPU package 或 VM memory，不覆盖 device-local state。"
  - "Accelerator TEE 的难点是 device identity、command queue、DMA buffer、memory encryption 和 attestation 要一起考虑。"
  - "这为后续 Arm CCA I/O、DPU/SmartNIC 和 confidential storage 章节提供问题边界。"
  evidence_refs:
  - "Accelerator TEE SoK p.1 abstract: sensitive data/code in accelerators need confidentiality, integrity, isolation."
  - "Accelerator TEE SoK Fig.2: attack vectors of accelerator computing."
  proof_object:
    type: path_compare
    title: "CPU TEE vs accelerator TEE"
    data:
      paths:
      - label: "CPU-centric TEE"
        steps: ["CPU memory", "enclave/realm", "host untrusted"]
        note: "主要保护 CPU 执行和内存"
      - label: "Accelerator TEE"
        steps: ["DMA buffer", "device runtime", "device memory", "result path"]
        note: "必须覆盖跨设备 data path"
  source_note: "问题路径依据 SoK 的 attack-vector 图和 architecture overview 重绘。"

- slide_id: d01-13-accelteesok-solution
  paper_key: sok-tee
  slide_type: solution
  claim: "这篇 SoK 的可用成果是一个分层 checklist，用来检查 accelerator TEE 是否只保护了入口，还是覆盖了完整 data path。"
  narrative:
  - "Table I 给出被分析的 accelerator TEE 范围，Table III/IV 比较安全方案和 access control 偏好。"
  - "Figure 3 把 memory encryption workflow 作为重要维度，而不是只看 enclave 创建。"
  - "对本报告来说，最有用的是把 device identity、access control、memory path、runtime 和 attestation 拆开讲。"
  - "这样可以避免把任意 GPU enclave 或 SmartNIC offload 都写成同一类 confidential I/O。"
  evidence_refs:
  - "Accelerator TEE SoK Table I: overview of analyzed accelerator TEEs."
  - "Accelerator TEE SoK Table III-Table IV and Fig.3: security solutions, access control, memory encryption workflows."
  proof_object:
    type: mechanism_flow
    title: "accelerator TEE checklist"
    data:
      stages:
      - "device identity"
      - "command/runtime isolation"
      - "DMA and memory access control"
      - "memory encryption/integrity"
      - "attestation and lifecycle"
  source_note: "checklist 综合 Table I、Table III、Table IV 和 Figure 3。"

