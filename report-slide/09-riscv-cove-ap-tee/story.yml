  slide_type: summary
  claim: "AP-TEE draft 是 RISC-V TVM 语义的当前规范入口，定义 TSM、TVM、measurement 和 confidential memory；无新实验。"
  narrative:
  - "本地 PDF 标注 Version 0.7, 8/2024，且声明文档仍在 development。"
  - "目录包含 TVM security requirements、TSM initialization/operation、TVM attestation and measurements。"
  - "规范还讨论 non-confidential memory 与 confidential memory 的转换。"
  - "它是 E3 draft，不是 ratified official standard。"
  evidence_refs:
