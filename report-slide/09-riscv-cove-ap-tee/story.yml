direction: "RISC-V CoVE / AP-TEE confidential VM"
story_version: 1
slides:
- slide_id: d09-00-direction-intro
  paper_key: direction
  slide_type: direction_intro
  claim: "CoVE/AP-TEE 这一节把 RISC-V 从 enclave framework 推进到 confidential VM lifecycle。"
  narrative:
  - "Sahita 2023 CoVE 是早期 reference architecture，提出 RISC-V 上面向 virtualized workloads 的 confidential VM 框架。"
  - "AP-TEE draft 是当前标准化路径中的 TVM/TSM 规范入口，但仍是 draft。"
  - "Boubakri 2025 survey 用来把 CoVE/AP-TEE 放回 RISC-V TEE lineage。"
  - "本方向要区分 pre-CoVE enclave、TVM lifecycle 和后续 CoVE-IO。"
  evidence_refs:
  - "survey/evidence_ledger.md Slide Primary Ledger, 09-riscv-cove-ap-tee."
  - "CoVE p.1 abstract; AP-TEE spec p.1 version line; Boubakri 2025 p.1 abstract."
  proof_object:
    type: evolution_timeline
    title: "RISC-V confidential VM 证据链"
    data:
      steps:
      - label: "CoVE 2023"
        claim: "reference architecture"
        evidence: "E3 preprint/proposal"
      - label: "AP-TEE 2024"
        claim: "TVM/TSM draft semantics"
        evidence: "E3 draft spec"
      - label: "RISC-V TEE survey"
        claim: "lineage cross-check"
        evidence: "E2 survey"
  source_note: "方向页严格保留 CoVE/AP-TEE draft status。"

- slide_id: d09-01-cove-summary
  paper_key: sahita2023cove
  slide_type: summary
  claim: "CoVE 的核心贡献是把 RISC-V confidential computing 定义成 TVM + TSM + host 的三方结构。"
  narrative:
  - "论文描述 RISC-V 平台上面向 rich OS virtualized workloads 的 confidential VM framework。"
  - "host 仍负责资源管理，但不能直接访问 TVM 私有状态。"
  - "TSM/firmware 负责创建、运行、测量和隔离 TVM。"
  - "它是 CoVE/AP-TEE 标准化前的关键 architecture proposal。"
  evidence_refs:
  - "CoVE p.1 abstract: first application-class processor architecture framework for Confidential VMs on RISC-V."
  - "CoVE Fig.1 and Table 1: RISC-V CoVE reference architecture and privilege levels."
  proof_object:
    type: mechanism_flow
    title: "CoVE reference architecture"
    data:
      stages:
      - "host/VMM manages resources"
      - "TSM mediates confidential operations"
      - "TVM owns confidential memory"
      - "SBI/ABI requests cross boundary"
      - "measurement supports attestation"
  source_note: "机制图按 Figure 1、Table 1 和摘要重绘。"

- slide_id: d09-02-cove-background
  paper_key: sahita2023cove
  slide_type: background
  claim: "CoVE 的背景问题是传统 RISC-V privilege model 默认 machine-mode firmware 可信，但云场景要把 host/VMM 排除出 tenant TCB。"
  narrative:
  - "RISC-V machine mode 权限最高，平台 firmware 通常天然可信。"
  - "多租户云平台中，host OS、VMM 和平台管理软件都可能不被 tenant 信任。"
  - "enclave framework 保护进程或应用，不能直接表达完整 VM lifecycle。"
  - "CoVE 因此把 RISC-V TEE 问题推进到 TVM 抽象。"
  evidence_refs:
  - "CoVE p.1 introduction: multi-tenant platforms and privileged software components."
  - "CoVE Table 1: RISC-V privilege levels and trust positioning."
  proof_object:
    type: comparison_matrix
    title: "enclave 与 TVM 的差异"
    data:
      columns: ["维度", "pre-CoVE enclave", "CoVE TVM"]
      rows:
      - ["保护对象", "应用/进程 enclave", "完整 guest VM"]
      - ["管理者", "secure monitor", "TSM + host split"]
      - ["内存状态", "enclave pages", "confidential TVM memory"]
      - ["证据", "enclave measurement", "TVM measurement/report"]
  source_note: "对比依据 CoVE introduction 与 Table 1。"

- slide_id: d09-03-cove-solution
  paper_key: sahita2023cove
  slide_type: solution
  claim: "CoVE 的解决方案是让 TSM 成为 TVM lifecycle 的 gatekeeper，并通过 SBI/ABI 暴露受控管理接口。"
  narrative:
  - "host 请求创建 TVM、添加 pages 和 vCPUs，但关键状态转换由 TSM 检查。"
  - "TVM 内部通过 guest ABI 请求受信服务。"
  - "confidential memory 与普通 memory 的转换成为 lifecycle 核心。"
  - "这种结构与 Arm CCA/RMM 在理念上可对照，但具体接口不同。"
  evidence_refs:
  - "CoVE Fig.1: reference architecture with TSM, host and TVM."
  - "CoVE conclusion: framework for scalable Confidential VMs on RISC-V platforms."
  proof_object:
    type: path_compare
    title: "host path vs TVM path"
    data:
      paths:
      - label: "host management"
        steps: ["VMM request", "TSM check", "TVM resource update", "run TVM"]
        note: "host manages but is mediated"
      - label: "TVM service"
        steps: ["guest request", "confidential ABI", "TSM service", "attestation/memory response"]
        note: "tenant path avoids trusting host"
  source_note: "接口路径按 Figure 1 和 CoVE lifecycle 叙事重绘。"

- slide_id: d09-04-cove-experiments
  paper_key: sahita2023cove
  slide_type: experiments
  claim: "CoVE 2023 主要提供 architecture proposal；它的证据适合讲 TVM model，不适合写成 ratified implementation。"
  narrative:
  - "论文篇幅短，重点是 reference architecture 和 future work。"
  - "它说明 RISC-V 如何支持 Confidential VMs on rich OS workloads。"
  - "它没有提供完整产品级实现或标准成熟度证据。"
  - "因此本报告把它标为 E3 public preprint/proposal。"
  evidence_refs:
  - "CoVE p.1 abstract and Fig.1: reference architecture evidence."
  - "CoVE conclusion and Future Work: framework described, future standardization implied."
  proof_object:
    type: evidence_gap_matrix
    title: "CoVE 2023 证据读法"
    data:
      columns: ["可支撑", "不能支撑"]
      rows:
      - ["TVM/TSM reference architecture", "ratified standard"]
      - ["RISC-V confidential VM direction", "完整产品部署"]
      - ["与 CCA 概念对照", "CoVE-IO device path"]
  source_note: "按 E3 proposal 使用，避免成熟度过写。"

- slide_id: d09-05-cove-evaluation
  paper_key: sahita2023cove
  slide_type: evaluation
  claim: "CoVE 的价值是给 RISC-V confidential VM 定义入口；短板是早期 proposal 还没有完整规范闭环。"
  narrative:
  - "优点是把 RISC-V TEE 从 enclave 叙事转向 TVM。"
  - "不足是许多 ABI、measurement、memory lifecycle 和 I/O 细节需要后续 AP-TEE/CoVE-IO draft。"
  - "商业潜力在开放 RISC-V 云 confidential computing。"
  - "落地风险在 spec maturity、firmware TCB、platform profile 和 vendor interoperability。"
  evidence_refs:
  - "CoVE Fig.1 and conclusion: reference architecture and future work."
  - "AP-TEE spec p.1 version line: document under development, expect potential changes."
  proof_object:
    type: comparison_matrix
    title: "评价"
    data:
      columns: ["维度", "判断"]
      rows:
      - ["强项", "RISC-V confidential VM 入口"]
      - ["短板", "E3 proposal，规范细节仍在演进"]
      - ["落地场景", "RISC-V cloud TVM"]
      - ["后续依赖", "AP-TEE/CoVE-IO/IOMMU/AIA"]
  source_note: "评价结合 CoVE proposal 和 AP-TEE draft status。"

- slide_id: d09-06-aptee-summary
