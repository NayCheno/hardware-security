direction: RISC-V CoVE / AP-TEE confidential VM
focus: 把 pre-CoVE enclave 与 AP-TEE/CoVE TVM lifecycle 区分开。
selection_rule: 固定三篇 primary；survey 只作为 background substrate，不替代 CoVE/AP-TEE 机制证据。
primary:
- key: sahita2023cove
  role: foundational
  selection_reason: CoVE 2023 is the early mainline design material for RISC-V confidential VMs.
  evidence_type: E3 public preprint/proposal
  maturity: public preprint/proposal, not peer-reviewed
  pdf_status: local_pdf_verified
  source_url: https://arxiv.org/abs/2304.06167
  evidence: E3 / Foundational public preprint
  source_status: local_pdf_verified
  reference: reference/risc-v-confidential-computing/cove-towards-confidential-computing-on-risc-v-platforms/paper.pdf
  title: RISC-V CoVE reference architecture
  summary: 提出 RISC-V CoVE confidential computing 参考架构方向，明确 confidential VM 需要的 ISA、non-ISA、SoC 与 platform requirements。
  background: 多租户 confidential VM 需要降低 tenant 对 host/hypervisor 的信任，并区别于单进程 enclave lineage。
  insight_solution: 用 CoVE reference architecture 描述 TVM 所需的硬件、固件、hypervisor 和 platform support。
  key_technologies:
  - RISC-V confidential VM reference architecture
  - ISA/non-ISA/SoC/platform requirement split
  - Host/hypervisor trust reduction for TVM
  experiment_claim: 架构论文/position-style，无完整系统实验；具体 ABI/state details 需要 AP-TEE draft。
  evaluation:
    strengths: CoVE confidential VM 入口材料，能把 RISC-V 从 enclave lineage 推向 TVM 模型。
    limitations: 不提供完整 ABI、状态机或 ratified standard 语义。
    commercialization: 对开放 confidential VM 生态有方向价值；风险在标准未定、平台支持和 verifier ecosystem。
  auxiliary: []
- key: riscv_ap_tee_2024
  role: sota_1
  selection_reason: AP-TEE draft is the current standards-track source for RISC-V confidential VM semantics.
  evidence_type: E3 draft/preprint, not ratified
  maturity: draft/preprint, not ratified
  pdf_status: local_pdf_verified
  source_url: https://github.com/riscv-non-isa/riscv-ap-tee/releases/tag/v0.7
  evidence: E3 / Draft-not-ratified
  source_status: local_pdf_verified
  reference: reference/risc-v-confidential-computing/risc-v-ap-tee-specification/paper.pdf
  title: RISC-V AP-TEE / CoVE TVM 规范草案
  summary: 定义 RISC-V AP-TEE/CoVE TVM lifecycle 和 SBI ABI，包括 TVM、TSM、COVH/COVG 与 memory lifecycle。
  background: CoVE 需要标准化 TVM、TSM、memory lifecycle、attestation 和 host/guest 调用界面，才能与 Arm CCA/RMM 同层比较。
  insight_solution: 给出 TSM、TSM-driver、Supervisor Domains、COVH/COVG、memory donation/reclaim/share 等 draft 规范语义。
  key_technologies:
  - TVM/TSM lifecycle and SBI ABI
  - COVH/COVG host/guest interface split
  - Memory donation, reclaim and sharing semantics
  experiment_claim: 规范/Survey，无新实验；draft/not-ratified，不能写成 ratified standard 或 production ABI。
  evaluation:
    strengths: 当前最关键的 RISC-V CCA 对照材料，直接定义 TVM/TSM lifecycle。
    limitations: v0.7 RC2 仍是 draft，状态机和 ABI 可能变化。
    commercialization: 商业潜力在开放 confidential VM stack；风险在标准收敛、firmware/OS support 和兼容迁移。
  auxiliary: []
- key: boubakri2025riscvtee
  role: sota_2
  selection_reason: Recent RISC-V TEE survey cross-checks the CoVE and AP-TEE lineage against older enclave systems.
  evidence_type: E2 peer-reviewed survey/SoK
  maturity: peer-reviewed survey/SoK
  pdf_status: local_pdf_verified
  source_url: https://www.mdpi.com/2079-9292/14/21/4171
  evidence: E2 survey / Background substrate
  source_status: local_pdf_verified
  reference: reference/risc-v-confidential-computing/a-survey-of-risc-v-secure-enclaves-and-trusted-execution-environments/README.md
  title: RISC-V TEE 谱系辅助材料
  summary: 把 pre-CoVE enclave 与 CoVE 放入 RISC-V TEE 谱系，辅助区分 enclave architecture、trusted monitor/runtime 和 confidential VM。
  background: RISC-V TEE 论文和规范发展快，survey 可减少分类断裂；即使本地 PDF 已核验，机制细节仍要回到原始论文/spec。
  insight_solution: 按 secure enclave、TEE mechanism、memory/I/O/attestation support 分类；机制 claim 必须回引 CoVE paper 和 AP-TEE spec。
  key_technologies:
  - RISC-V enclave and TEE taxonomy
  - Pre-CoVE versus CoVE/AP-TEE classification
  - Survey bridge for representative systems
  experiment_claim: 规范/Survey，无新实验；本地 PDF 已核验，但仍只使用 taxonomy/background claim。
  evaluation:
    strengths: 有助于横向定位 Keystone/Penglai/SPEAR-V 与 CoVE/AP-TEE。
    limitations: Survey 不能替代原始机制论文或官方规范，尤其不能承载性能或安全证明细节。
    commercialization: 适合产品路线图分类；风险在 survey 分类滞后和不同 threat model 被误合并。
  auxiliary: []
