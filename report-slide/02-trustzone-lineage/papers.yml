direction: Arm TrustZone TEE 与漏洞谱系
focus: 把 TrustZone 作为 CCA 前史和边界对比，不把 TrustZone threat model 误写成 CCA。
selection_rule: 第一篇为 foundational/方向入口，后两篇优先选择 SOTA/spec/draft/industry evidence。
papers:
- key: arm_trustzone_whitepaper
  role: Foundational / Arm whitepaper
  title: Arm TrustZone 白皮书
  summary: 介绍 Secure/Non-secure world、NS bit 和 SoC 级隔离的基本模型。
  background: 移动和嵌入式平台需要把安全服务从普通 OS 中隔离出来。
  solution: 在处理器、互连和外设路径传播安全状态，形成双世界系统。
  experiment: 白皮书，无实验。
  comment: 历史基础价值高；不应当作 CCA 或 confidential VM 的 threat model 证据。商业上是移动 SoC 安全服务的经典基础。
- key: pinto2019trustzone
  role: Background substrate / ACM CSUR 2019 survey
  title: Demystifying Arm TrustZone
  summary: 全面梳理 TrustZone 架构、TEE 软件栈、应用和虚拟化相关工作。
  background: TrustZone 长期被广泛部署，但公开系统化资料不足。
  solution: 按系统软件、TEE、虚拟化和应用场景分类。
  experiment: Survey，无新实验。
  comment: 适合写 TrustZone 背景；对 CCA/RME 不完整。商业价值在于帮助厂商盘点老 TEE 生态。
- key: cerdeira2020trustzone
  role: Background substrate / IEEE S&P 2020 SoK
  title: TrustZone-assisted TEE 漏洞 SoK
  summary: 归纳 TrustZone-assisted TEE 的主流漏洞类型和根因。
  background: TrustZone TEE 暴露接口复杂、TCB 变大，真实系统反复出现漏洞。
  solution: 按漏洞面、接口、权限边界和实现缺陷建立 taxonomy。
  experiment: SoK/漏洞分析，无新系统实验。
  comment: 能支撑“为什么需要更强 CCA threat model”；不能替代 CCA 机制分析。商业价值在安全审计与迁移评估。
