      - ["deployment direction", "complete platform security"]
  source_note: "厂商技术材料，无独立学术实验；本页按 E4 使用。"

- slide_id: d11-15-amd-evaluation
  paper_key: amd_sev_snp
  slide_type: evaluation
  claim: "AMD vendor evidence 展示产业界从 memory confidentiality 走向 state integrity，但当前本地证据不足以承担 SEV-SNP 细节证明。"
  narrative:
  - "优点是说明现代 encrypted VM 必须保护 register state 和 resume integrity。"
  - "不足是 vendor whitepaper 不是 peer-reviewed proof，且本地 PDF 与 SNP metadata 不一致。"
  - "商业落地价值在真实云 confidential VM 生态相关性。"
  - "使用规则是只写本地 PDF 可复核的 SEV-ES state protection，以及 README 标记的 E4 边界。"
  evidence_refs:
  - "AMD local PDF p.3-p.5: SEV-ES security goals and encrypted register state."
  - "AMD reference README p.1: E4 industry evidence role and caution against generalization."
  proof_object:
    type: comparison_matrix
    title: "评价"
    data:
      columns: ["维度", "判断"]
