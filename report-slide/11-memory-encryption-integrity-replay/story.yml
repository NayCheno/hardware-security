      - ["短板", "vendor-only 且 local PDF mismatch"]
      - ["落地价值", "云 confidential VM 相关"]
      - ["使用边界", "不写不可复核 SNP/RMP 细节"]
  source_note: "评价特意记录 evidence mismatch，避免用错本地 PDF。"

- slide_id: d11-16-direction-summary
  paper_key: direction
  slide_type: direction_summary
  claim: "Memory security 的 takeaway 是加密、完整性、freshness 和 ownership 是四个不同层；引用时必须按证据来源分开。"
  narrative:
  - "Henson survey 给 taxonomy，提醒 full disk encryption 不是 runtime memory security。"
  - "BMT 给 peer-reviewed integrity/freshness mechanism anchor。"
  - "AMD vendor material 给产业 encrypted-state evidence，但不能替代 peer-reviewed proof。"
  - "后续 CCA/CoVE/I/O 章节谈 ownership/access control 时，不应自动写成 encryption 或 replay protection。"
  evidence_refs:
  - "Henson 2014 Fig.1/Table I; Rogers 2007 p.1/Table 1/Fig.7; AMD local PDF p.1-p.5."
  - "survey/evidence_ledger.md Boundary Records, 11-memory-encryption-integrity-replay."
  proof_object:
    type: comparison_matrix
    title: "方向总结"
    data:
      columns: ["问题", "主证据", "后续使用规则"]
      rows:
      - ["confidentiality taxonomy", "Henson survey", "只作概念边界"]
      - ["integrity/freshness", "BMT", "机制 anchor"]
      - ["vendor deployment", "AMD E4", "只写可复核内容"]
      - ["ownership/access control", "CCA/PMP/IOMMU contrast", "不混成加密"]
  source_note: "方向总结基于三类 evidence class 的分工。"
