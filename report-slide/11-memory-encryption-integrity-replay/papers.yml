direction: Memory encryption / integrity / replay protection
focus: 避免把 access control、ownership、encryption、integrity、freshness/replay 混写。
selection_rule: 固定三篇 primary；`riscv_ap_tee_2024` 作为 AP-TEE/CoVE lifecycle auxiliary，不计入三篇主讲。
primary:
- key: henson2014memory
  role: foundational
  selection_reason: Henson 2014 is the background starting point for secure memory encryption, integrity, and replay defense.
  evidence_type: E2 peer-reviewed survey/SoK
  maturity: peer-reviewed survey/SoK
  pdf_status: local_pdf_verified
  source_url: https://doi.org/10.1145/2566673
  evidence: E2 / Background substrate
  source_status: local_pdf_verified
  reference: reference/architecture-and-platform-security/sok/memory-encryption-survey-existing-techniques/paper.pdf
  title: 'Memory Encryption: A Survey of Existing Techniques'
  summary: 综述 memory encryption 的威胁模型、技术路线和性能/安全权衡。
  background: Full disk encryption 不能保护运行时 DRAM、bus 和 DMA 路径上的明文；access control 与 encryption/integrity/replay 是不同问题。
  insight_solution: 按硬件增强、OS 辅助、专用设备与 cryptographic memory controller 路线组织 taxonomy，并解释 encryption、authentication、attestation、secure boot 的边界。
  key_technologies:
  - Off-chip memory confidentiality threat model
  - Memory authentication and integrity taxonomy
  - Counter/freshness/replay-protection tradeoff
  experiment_claim: Survey，无新实验；证据来自既有论文、系统设计和攻击案例。
  evaluation:
    strengths: 最适合给本方向提供概念边界，防止把 PMP/GPT/IOPMP 写成 encryption。
    limitations: 2014 时间截面早于 SEV-SNP、TDX、Arm CCA、RISC-V CoVE 和 CXL/PCIe IDE。
    commercialization: 可作为架构设计 checklist；风险是单独引用会遗漏现代 confidential VM ownership metadata。
  auxiliary: []
- key: amd_sev_snp
  role: sota_1
  selection_reason: AMD SEV-SNP whitepaper captures a mature commercial VM memory integrity and replay-protection design.
  evidence_type: E4 industry/vendor evidence
  maturity: industry/vendor evidence
  pdf_status: local_pdf_verified
  source_url: https://docs.amd.com/v/u/en-US/SEV-SNP-strengthening-vm-isolation-with-integrity-protection-and-more
  evidence: E4 / Industry evidence
  source_status: local_pdf_verified
  reference: reference/architecture-and-platform-security/amd-sev-snp-strengthening-vm-isolation/paper.pdf
  title: AMD SEV-SNP as memory-integrity industry evidence
  summary: SEV-SNP 在 encrypted VM 基础上加入 secure nested paging 与完整性相关保护，减少 host-controlled metadata 风险。
  background: 早期 encrypted VM 面临 nested page table、reverse map metadata、replay/alias 和 malicious hypervisor 控制面风险。
  insight_solution: 引入 secure nested paging、RMP 等机制，把 memory ownership/validation 与 encrypted VM lifecycle 结合。
  key_technologies:
  - Secure Nested Paging
  - Reverse Map Table / memory ownership metadata
  - Integrity-oriented VM isolation controls
  experiment_claim: 厂商技术材料，无独立学术实验；只能作为产业机制和部署 evidence。
  evaluation:
    strengths: 展示 memory encryption 从 confidentiality 走向 integrity/metadata protection 的商用方向。
    limitations: Vendor whitepaper 不是 peer-reviewed proof，也不证明所有 SEV-SNP 部署抵抗实现攻击或侧信道。
    commercialization: 具有真实云平台相关性；风险在供应商绑定、固件/微码版本和 verifier policy 透明度。
  auxiliary: []
- key: arm_cca_spec
  role: sota_2
  selection_reason: Arm CCA specification defines current Realm memory ownership and granule lifecycle evidence.
  evidence_type: E0 official standard/specification
  maturity: official standard/specification
  pdf_status: source_verified_pdf_unavailable
  source_url: https://developer.arm.com/documentation/den0125/latest
  evidence: E0 / Spec-standard SOTA
  source_status: source_verified_pdf_unavailable
  reference: reference/arm-confidential-computing/arm-cca-specification/README.md
  title: Arm CCA memory ownership and lifecycle
  summary: Arm CCA 用 Realm、GPT/GPC、RIPAS 和 lifecycle 语义保护 confidential workload memory ownership。
  background: CCA 需要让 host 管理资源，同时不能直接读取或破坏 Realm protected memory；这里的重点是 ownership/access-control，不是 memory-encryption survey 的替代品。
  insight_solution: 通过 CCA/RME 公共概念描述 Realm lifecycle、granule ownership、protected address space 和 host/Realm transition。
  key_technologies:
  - Realm and protected address space lifecycle
  - GPT/GPC ownership and access-control semantics
  - RIPAS / memory state transition concepts
  experiment_claim: 官方规范来源已核验但本地 PDF 不可用；无新实验，只使用公开架构概念。
  evaluation:
    strengths: 给 Arm CCA memory ownership 和 lifecycle 提供 E0 规范证据。
    limitations: 不能把未下载的非公开细节写成已复核机制，也不能把 access-control/lifecycle 写成 encryption/integrity proof。
    commercialization: 适合说明 Arm server/mobile CCA 的标准边界；风险在真实硬件、固件实现和云平台策略尚需 production evidence。
  auxiliary:
  - riscv_ap_tee_2024
auxiliary:
- key: riscv_ap_tee_2024
  role: Draft/not ratified / AP-TEE v0.7 RC2
  evidence: E3 / Draft-not-ratified
  source_status: local_pdf_verified
  reference: reference/risc-v-confidential-computing/risc-v-ap-tee-specification/paper.pdf
  use: 辅助对照 RISC-V TVM/TSM memory donation/reclaim/share lifecycle；不计入三篇主讲，也不写成 ratified standard。
