        items:
        - 槽位：primary_1
        - 类型：sok
        - 证据：E2 / Background substrate
        - 来源：local_pdf_verified
    background:
      claim: Full disk encryption 不能保护运行时 DRAM、bus 和 DMA 路径上的明文
      points:
      - Full disk encryption 不能保护运行时 DRAM、bus 和 DMA 路径上的明文
      - access control 与 encryption/integrity/replay 是不同问题
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 按硬件增强、OS 辅助、专用设备与 cryptographic memory controller 路线组织 taxonomy，并解释 encry。
      points:
      - 按硬件增强、OS 辅助、专用设备与 cryptographic memory controller 路线组织 taxonomy，并解释 encryption、authentication、attestation、secure boot
        的边界
      visual:
        title: 关键机制
        items:
        - Off-chip memory confidentiality threat model
        - Memory authentication and integrity taxonomy
        - Counter/freshness/replay-protection tradeoff
    experiments:
      claim: 规范/Survey，无新实验
      points:
      - 规范/Survey，无新实验
      - 证据来自既有论文、系统设计和攻击案例
      visual:
        title: 证据强度
        items:
        - 类型：E2 peer-reviewed survey/SoK
        - 成熟度：peer-reviewed survey/SoK
        - PDF：local_pdf_verified
    evaluation:
      claim: 最适合给本方向提供概念边界，防止把 PMP/GPT/IOPMP 写成 encryption
      strengths: 最适合给本方向提供概念边界，防止把 PMP/GPT/IOPMP 写成 encryption。
      limitations: 2014 时间截面早于 SEV-SNP、TDX、Arm CCA、RISC-V CoVE 和 CXL/PCIe IDE。
      commercialization: 可作为架构设计 checklist；风险是单独引用会遗漏现代 confidential VM ownership metadata。
- key: rogers2007bonsai
  role: peer_reviewed_mechanism_anchor
  selection_slot: primary_2
  paper_type: system
  claim_strength: E1
  selection_reason: Peer-reviewed Bonsai Merkle Tree mechanism anchor for memory integrity, freshness, and replay protection.
  evidence_type: E1 peer-reviewed primary paper
  maturity: peer-reviewed primary paper
  pdf_status: local_pdf_verified
  source_url: https://doi.org/10.1109/MICRO.2007.16
  evidence: E1 / Peer-reviewed mechanism anchor
  source_status: local_pdf_verified
  reference: reference/architecture-and-platform-security/address-independent-seed-encryption-bonsai-merkle-trees/paper.pdf
  title: Bonsai Merkle Trees for memory integrity and freshness
  auxiliary:
  - suh2003aegis
  - suh2003memoryintegrity
  slides:
    summary:
      claim: Bonsai Merkle Trees use counter/tree metadata to detect tamper and replay, anchoring memory freshness evidence.
      points:
      - Counter/tree metadata detects tamper and replay
      - Provides peer-reviewed evidence for memory integrity and freshness
      visual:
        title: Evidence position
        items:
        - 'slot: primary_2'
        - 'type: system'
        - 'evidence: E1 / Peer-reviewed mechanism anchor'
        - 'source: local_pdf_verified'
    background:
      claim: Encryption alone cannot detect stale or modified memory values returned by an untrusted memory system.
      points:
      - Encryption alone cannot detect stale or modified memory values
      - Freshness requires integrity trees, counters, or authenticated roots
      visual:
        title: Problem boundary
        items:
        - memory tamper
        - stale-data replay
        - OS/performance-friendly metadata
    solution:
      claim: Address-independent seed encryption and Bonsai Merkle Trees reduce secure-processor integrity-tree overhead.
      points:
      - Address-independent seed encryption reduces OS friction
      - Bonsai Merkle Trees authenticate counter metadata and root state
      visual:
        title: Mechanism view
        items:
        - AISE counter-mode seed
        - BMT over encryption counters
        - root MAC for replay/tamper detection
    experiments:
      claim: MICRO 2007 peer-reviewed paper reports secure-processor simulation results and reduced memory-integrity overhead.
      points:
      - MICRO 2007 peer-reviewed secure-processor simulation
      - Historical performance numbers are lineage evidence, not direct CCA/SEV-SNP product comparison
      visual:
        title: Evidence strength
        items:
        - 'type: E1 peer-reviewed primary paper'
        - 'maturity: peer-reviewed primary paper'
        - 'PDF: local_pdf_verified'
    evaluation:
      claim: Moves the section anchor from vendor/spec contrast back to peer-reviewed memory-integrity and freshness mechanisms.
      strengths: Moves the section anchor from vendor/spec contrast back to peer-reviewed memory-integrity and freshness mechanisms.
      limitations: Secure-processor lineage is not the same as a modern confidential-VM product; deployment claims still need
        SEV-SNP, TDX, CCA, or CoVE evidence.
      commercialization: Useful for memory-controller integrity-tree design; productization depends on metadata storage, root
        protection, and performance budget.
