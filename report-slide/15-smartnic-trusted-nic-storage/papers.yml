direction: SmartNIC / trusted NIC / secure storage data path
focus: 把 NIC-local root、secure offload、resource management 与 confidential storage 分开写。
selection_rule: 固定三篇 primary；`nvidia_bluefield_operation_2025` 与 `khalilov2024osmosis` 作为辅助材料，不计入三篇主讲。
primary:
- key: zhou2024snic
  role: foundational
  selection_reason: sNIC is the foundational peer-reviewed systems paper for cloud SmartNIC isolation.
  evidence_type: E1 peer-reviewed primary work
  maturity: peer-reviewed primary work
  pdf_status: local_pdf_verified
  source_url: https://minlanyu.seas.harvard.edu/writeup/eurosys24.pdf
  evidence: E1 / Peer-reviewed SOTA
  source_status: local_pdf_verified
  reference: reference/memory-and-io-fabrics/smartnic-security-isolation-cloud-snic/paper.pdf
  title: 'S-NIC: SmartNIC function isolation'
  auxiliary:
  - khalilov2024osmosis
  - nvidia_bluefield_operation_2025
  slides:
    summary:
      claim: S-NIC 提出 virtual smart NIC，用硬件隔离 SmartNIC 上的 network functions
      points:
      - S-NIC 提出 virtual smart NIC，用硬件隔离 SmartNIC 上的 network functions
      visual:
        title: 证据定位
        items:
        - 角色：foundational
        - 证据：E1 / Peer-reviewed SOTA
        - 来源：local_pdf_verified
    background:
      claim: SmartNIC/DPU 上运行 packet processing、DPI、NAT、storage offload 后，NIC OS 和其他租户。
      points:
      - SmartNIC/DPU 上运行 packet processing、DPI、NAT、storage offload 后，NIC OS 和其他租户函数可能泄漏或篡改 state
      visual:
        title: 问题边界
        items:
        - 保护对象
        - 攻击/管理边界
        - 现有方法缺口
    solution:
      claim: 用 memory denylist、locked TLB、cache partitioning、accelerator virtualizatio。
      points:
      - 用 memory denylist、locked TLB、cache partitioning、accelerator virtualization、DMA isolation、bus arbitration 和 attestation
        实现 NIC-local single-owner semantics
      visual:
        title: 关键机制
        items:
        - Virtual SmartNIC launch/destroy lifecycle
        - Memory denylist, locked TLB, and DMA isolation
        - Cache partitioning, accelerator virtualization, and bus arbitration
    experiments:
      claim: 论文报告硬件面积约 +8.89%，功耗约 +11.45%，function throughput worst-case 下降小于 1.7%
      points:
      - 论文报告硬件面积约 +8.89%，功耗约 +11.45%，function throughput worst-case 下降小于 1.7%
      visual:
        title: 证据强度
        items:
        - 类型：E1 peer-reviewed primary work
        - 成熟度：peer-reviewed primary work
        - PDF：local_pdf_verified
    evaluation:
      claim: 为 secure vNIC/vSwitch/offload 提供清晰的 NIC-local resource ownership baseline
      strengths: 为 secure vNIC/vSwitch/offload 提供清晰的 NIC-local resource ownership baseline。
      limitations: 没有真实 production NIC silicon，也不是完整 VM/Realm trusted I/O 或 SPDM/TDISP lifecycle。
      commercialization: 可指导 DPU tenant network-function isolation；落地风险在资源利用率、function chaining 和 vendor attestation 绑定。
