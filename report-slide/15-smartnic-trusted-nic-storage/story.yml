- slide_id: d15-10-tnic-evaluation
  paper_key: giantsidi2025tnic
  slide_type: evaluation
  claim: "TNIC 的价值是把 trusted distributed systems 的可信根放到网络接口，短板是需要 NIC silicon 和形式化硬件生态支持。"
  narrative:
  - "优点是低 latency、高 throughput，并减少 CPU TEE 依赖。"
  - "不足是需要专用 NIC architecture、formal verification 和 API adoption。"
  - "商业潜力在 BFT storage、replication、consensus 和 cloud control-plane services。"
  - "落地风险在 NIC vendor adoption、firmware lifecycle、key provisioning 和 failure recovery。"
  evidence_refs:
  - "TNIC Fig.2-Fig.4: architecture, attestation protocol and network stack."
  - "TNIC Fig.5-Fig.7 and abstract: latency/throughput results."
  proof_object:
    type: comparison_matrix
    title: "评价"
    data:
      columns: ["维度", "判断"]
      rows:
      - ["强项", "NIC-local formally verified RoT"]
      - ["短板", "requires new NIC architecture"]
      - ["落地场景", "BFT/storage/replication/control-plane"]
      - ["风险", "vendor/key/firmware/failure lifecycle"]
  source_note: "评价结合 TNIC architecture 和 performance claims。"

- slide_id: d15-11-hazel-summary
  paper_key: chrapek2026hazel
  slide_type: summary
  claim: "Hazel 的核心贡献是把 NVMe-oF disaggregated storage 的 confidentiality、integrity 和 freshness 放进 confidential computing threat model。"
  narrative:
  - "论文指出 NVMe-oF 在 HPC 和数据中心广泛使用，但现有 local encryption/integrity 方案难以适配 disaggregated path。"
  - "Hazel 设计 control path 和 data path，支持 counter leasing、metadata 和 HMT。"
  - "它关注 storage data path，不是 general NIC attestation。"
  - "它是 E3 draft SOTA，必须保留成熟度边界。"
  evidence_refs:
  - "Hazel p.1 abstract: secure and efficient disaggregated storage with confidentiality, integrity and freshness."
  - "Hazel Fig.3-Fig.5: control path, data path and HMT design."
  proof_object:
    type: mechanism_flow
    title: "Hazel storage path"
    data:
      stages:
      - "cluster manager schedules TEE"
      - "control path leases counters"
      - "NVMe-oF request issued"
      - "data path applies crypto/integrity"
      - "HMT manages metadata"
      - "storage result returned"
  source_note: "流程按 Figure 3-Figure 5 重绘；E3 draft 状态显式保留。"

- slide_id: d15-12-hazel-background
  paper_key: chrapek2026hazel
  slide_type: background
  claim: "Hazel 的背景问题是本地 dm-crypt/dm-integrity 思路搬到 NVMe-oF 后，会遇到 metadata、CPU 和 freshness 扩展性瓶颈。"
  narrative:
  - "disaggregated storage 把 host TEE、network fabric 和 JBOF SSDs 连接起来。"
  - "local encryption/integrity stack 可能导致 throughput 降低和 CPU usage 上升。"
  - "freshness 需要 counter/metadata 管理，分布式存储路径更难。"
  - "Hazel 因此同时设计 control path 和 optimized data path。"
  evidence_refs:
  - "Hazel p.1 abstract/introduction: local solutions can reduce throughput and drive CPU usage above 80%."
  - "Hazel Fig.1-Fig.2: disaggregated storage overview and algorithm comparison."
  proof_object:
    type: comparison_matrix
    title: "local storage protection 到 NVMe-oF 的失配"
    data:
      columns: ["问题", "local path", "disaggregated path"]
      rows:
      - ["confidentiality", "dm-crypt works locally", "network/storage path extends boundary"]
      - ["integrity", "metadata local", "side metadata must travel/manage"]
      - ["freshness", "local counters easier", "distributed counter leasing"]
      - ["performance", "CPU path acceptable", "NVMe-oF throughput sensitive"]
  source_note: "矩阵依据 Figure 1-Figure 2 和 introduction。"

