direction: "SmartNIC / trusted NIC / secure storage data path"
story_version: 1
slides:
- slide_id: d15-00-direction-intro
  paper_key: direction
  slide_type: direction_intro
  claim: "SmartNIC/trusted NIC/storage 这一节讨论 network/storage data path 的可信根如何从 CPU 移到 NIC 或 NVMe-oF path。"
  narrative:
  - "S-NIC 关注 SmartNIC 上多租户 network function 的 isolation。"
  - "TNIC 把 formally verified root of trust 放到 NIC hardware，用于 trustworthy distributed systems。"
  - "Hazel 把 confidential storage 的 confidentiality、integrity、freshness 组合到 disaggregated NVMe-oF data path。"
  - "三篇共同说明 NIC/storage 不是普通 I/O 设备，而是可能承载安全控制面的 endpoint。"
  evidence_refs:
  - "survey/evidence_ledger.md Slide Primary Ledger, 15-smartnic-trusted-nic-storage."
  - "S-NIC p.1 abstract; TNIC p.1 abstract; Hazel p.1 abstract."
  proof_object:
    type: evolution_timeline
    title: "NIC/storage trust 递进"
    data:
      steps:
      - label: "S-NIC"
        claim: "SmartNIC function isolation"
        evidence: "EuroSys 2024"
      - label: "TNIC"
        claim: "trusted NIC root"
        evidence: "ASPLOS 2025"
      - label: "Hazel"
        claim: "secure disaggregated storage"
        evidence: "2026 draft"
  source_note: "方向页按 data path endpoint 的可信化程度组织。"

- slide_id: d15-01-snic-summary
  paper_key: zhou2024snic
  slide_type: summary
  claim: "S-NIC 的核心贡献是为 cloud SmartNIC 上的多租户 network functions 提供硬件辅助隔离。"
  narrative:
  - "论文指出现代 SmartNIC 对不同 tenants 的 network functions 隔离不足。"
  - "SmartNIC 上的 management OS 也可能威胁 network function state。"
  - "S-NIC 引入 locked-down TLB entries 等机制保护 function memory 和 packet path。"
  - "它是 cloud SmartNIC isolation 的 foundational systems evidence。"
  evidence_refs:
  - "S-NIC p.1 abstract: commodity smart NICs provide weak isolation between network functions and management OS."
  - "S-NIC Fig.1-Fig.2: SmartNIC architecture and S-NIC high-level architecture."
  proof_object:
    type: mechanism_flow
    title: "S-NIC isolation flow"
    data:
      stages:
      - "tenant launches network function"
      - "S-NIC OS configures protected context"
      - "locked-down TLB protects memory"
      - "packet path remains isolated"
      - "management OS access constrained"
  source_note: "流程按 Figure 1 和 Figure 2 重绘。"

- slide_id: d15-02-snic-background
  paper_key: zhou2024snic
  slide_type: background
  claim: "S-NIC 的背景问题是 SmartNIC 已经运行租户代码，但隔离模型还停留在传统 NIC 或 host virtualization 思路。"
  narrative:
  - "SmartNIC 运行 DPI、firewall、load balancing 等 network functions。"
  - "这些 functions 共享 on-NIC CPU、DRAM、accelerators 和 management OS。"
  - "论文展示 commodity SmartNIC 可让 function 泄露或篡改彼此 state，并造成 shared hardware DoS。"
  - "因此需要 NIC-local isolation，而不是只依赖 host VM isolation。"
  evidence_refs:
  - "S-NIC p.1 abstract/introduction: weak isolation and concrete attacks."
  - "S-NIC Fig.4: sample use cases for S-NIC."
  proof_object:
    type: comparison_matrix
    title: "SmartNIC attack surface"
    data:
      columns: ["对象", "风险", "S-NIC 方向"]
      rows:
      - ["network function state", "tenant 间泄露或篡改", "memory isolation"]
      - ["packet buffers", "cross-function corruption", "protected packet path"]
      - ["management OS", "高权限访问租户 NF", "OS access constrained"]
      - ["accelerators", "shared resource DoS", "resource-aware isolation"]
  source_note: "矩阵依据摘要、introduction 和 Figure 4。"

- slide_id: d15-03-snic-solution
  paper_key: zhou2024snic
  slide_type: solution
  claim: "S-NIC 的设计把 network function launch、memory mapping 和 packet processing 都纳入 NIC-local protection。"
  narrative:
  - "Figure 2 展示 S-NIC high-level architecture。"
  - "locked-down TLB entries 保护租户 function 的内存映射。"
  - "host-visible management APIs 被重新设计，以减少 management OS 对租户 state 的直接访问。"
  - "Use cases 覆盖 vDPI、multi-tenant isolation 和 service chaining。"
  evidence_refs:
  - "S-NIC Fig.2: high-level architecture with locked-down TLB entries."
  - "S-NIC Table 1 and Fig.4: host-visible management APIs and sample use cases."
  proof_object:
    type: mechanism_flow
    title: "S-NIC launch and protect"
    data:
      stages:
      - "nf_launch invoked"
      - "protected memory mapped"
      - "locked TLB entries installed"
      - "packets processed by NF"
      - "management API constrained"
  source_note: "流程按 Figure 2、Table 1 和 Figure 4 重绘。"

- slide_id: d15-04-snic-experiments
  paper_key: zhou2024snic
  slide_type: experiments
  claim: "S-NIC 的评估包括 attack demonstrations、hardware cost estimates 和 use-case performance，显示 isolation cost 可控。"
  narrative:
  - "论文先 empirically demonstrates commodity SmartNIC weak isolation。"
  - "Table 4 估计 virtual TLB bank hardware costs。"
  - "文本报告某些 hardware-cost configuration 中估计 cost 增加最高约 8.37%。"
  - "Use cases 展示 S-NIC 可支持实际 network functions。"
  evidence_refs:
  - "S-NIC p.1 contributions: empirical attacks and new hardware-software isolation approach."
  - "S-NIC Table 4 and related text: estimated TLB bank hardware costs up to 8.37% in one configuration."
  proof_object:
    type: metric_bars
    title: "S-NIC proof objects"
    data:
      metrics:
      - label: "estimated cost upper example"
        value: "8.37%"
        bar: 8
        note: "Table 4 discussion"
      - label: "attack evidence"
        value: "empirical"
        bar: 70
        note: "contributions"
      - label: "use cases"
        value: "Fig.4"
        bar: 60
        note: "sample deployments"
  source_note: "数字来自 Table 4 附近文本；作为硬件成本估计，不是通用产品成本。"

- slide_id: d15-05-snic-evaluation
  paper_key: zhou2024snic
  slide_type: evaluation
  claim: "S-NIC 的价值是把 SmartNIC 视为多租户计算平台，短板是它保护 function isolation，不等于完整 trusted NIC root。"
  narrative:
  - "优点是问题真实，直接展示 commodity SmartNIC isolation gap。"
  - "不足是重点在 function isolation，而不是 attested NIC root 或 distributed protocol semantics。"
  - "商业潜力在 cloud NFV、service mesh offload 和 DPU/SmartNIC tenant isolation。"
  - "落地风险在 NIC vendor integration、management OS updates、accelerator sharing 和 observability。"
  evidence_refs:
  - "S-NIC Fig.1-Fig.4: architecture, S-NIC design and use cases."
  - "S-NIC Table 1-Table 4: APIs and hardware cost estimates."
  proof_object:
    type: comparison_matrix
    title: "评价"
    data:
      columns: ["维度", "判断"]
      rows:
      - ["强项", "SmartNIC tenant function isolation"]
      - ["短板", "不等同于 attested trusted NIC"]
      - ["落地场景", "NFV/DPU/SmartNIC cloud isolation"]
      - ["风险", "vendor integration and management OS"]
  source_note: "评价把 S-NIC 限定为 function isolation 系统。"

- slide_id: d15-06-tnic-summary
  paper_key: giantsidi2025tnic
  slide_type: summary
  claim: "TNIC 的核心贡献是把最小 formally verified root of trust 放到 NIC hardware，服务高性能 trustworthy distributed systems。"
  narrative:
  - "论文提出 trusted NIC architecture，用 NIC-level silicon RoT 支持 Byzantine/untrusted cloud environments。"
  - "设计目标包括 host CPU-agnostic security、minimal verifiable TCB 和 high performance。"
  - "TNIC 提供 attested append-only / non-equivocation 类网络安全基元。"
  - "它比 S-NIC 更进一步，把 NIC 从隔离平台变成协议可信根。"
  evidence_refs:
  - "TNIC p.1 abstract: minimal formally verified silicon root-of-trust at network interface level."
  - "TNIC Fig.2-Fig.4: hardware architecture, remote attestation protocol and network system stack."
  proof_object:
    type: mechanism_flow
    title: "TNIC trust path"
    data:
      stages:
      - "host submits network operation"
      - "TNIC attestation kernel checks state"
      - "100Gb MAC data path transmits"
      - "attested message generated"
      - "remote peer verifies NIC-backed property"
  source_note: "流程按 Figure 2-Figure 4 和摘要重绘。"

- slide_id: d15-07-tnic-background
  paper_key: giantsidi2025tnic
  slide_type: background
  claim: "TNIC 的背景是分布式系统需要低延迟和高吞吐，但 CPU TEE 的异构性和 TCB 代价很难支撑每个网络操作。"
  narrative:
  - "BFT、storage、replication、peer review 等系统需要节点行为可验证。"
  - "在 heterogeneous cloud 中，CPU TEE 可能有不同 security guarantee 和 programming model。"
  - "把每个网络操作都放进 CPU TEE 会损害 latency 和 throughput。"
  - "TNIC 因此把可信根放到网络接口，贴近 data path。"
  evidence_refs:
  - "TNIC p.1 introduction: distributed systems in untrusted cloud and limitations of CPU-based TEEs."
  - "TNIC Fig.2: hardware architecture with attestation kernel and 100Gb MAC."
  proof_object:
    type: comparison_matrix
    title: "CPU TEE vs NIC RoT"
    data:
      columns: ["维度", "CPU TEE", "TNIC"]
      rows:
      - ["位置", "CPU package", "network interface"]
      - ["data path", "可能绕路", "贴近 packet path"]
      - ["TCB", "TEE runtime + app", "minimal NIC kernel"]
      - ["分布式属性", "软件协议处理", "hardware-backed message property"]
  source_note: "对比依据 introduction 和 Figure 2。"

- slide_id: d15-08-tnic-solution
  paper_key: giantsidi2025tnic
  slide_type: solution
  claim: "TNIC 的设计用 attestation kernel、request/response handlers 和 counters，在 NIC 上生成可验证网络行为。"
  narrative:
  - "Figure 2 展示 TNIC hardware architecture，包括 100Gb MAC 和 attestation kernel。"
  - "Figure 3 展示 remote attestation protocol。"
  - "Table 1 给出 TNIC programming APIs。"
  - "核心 property 包括 non-equivocation 和 transferability。"
  evidence_refs:
  - "TNIC Fig.2-Fig.3: hardware architecture and remote attestation protocol."
  - "TNIC Table 1: programming APIs; p.1 abstract: non-equivocation and transferability goals."
  proof_object:
    type: mechanism_flow
    title: "TNIC operation"
    data:
      stages:
      - "application invokes TNIC API"
      - "request decoder extracts metadata"
      - "attestation kernel checks counters/state"
      - "message signed/attested"
      - "receiver verifies property"
  source_note: "流程按 Figure 2、Figure 3 和 Table 1 重绘。"

