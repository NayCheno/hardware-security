  slide_type: experiments
  claim: "TNIC 报告相比 CPU TEE software approach 低 3x-5x latency，并在 trusted distributed systems 中最高提升 6x throughput。"
  narrative:
  - "摘要报告 TNIC latency 比 software-based CPU TEE approach 低 3x-5x。"
  - "摘要报告 TNIC 对 trusted distributed systems throughput 最高提升 6x。"
  - "Figure 5-Figure 7 展示 Attest latency 和 breakdown。"
  - "这些结果说明 NIC-local RoT 对网络路径有性能价值。"
  evidence_refs:
  - "TNIC p.1 abstract: 3x-5x lower latency and up to 6x throughput improvement."
  - "TNIC Fig.5-Fig.7: Attest function latency, breakdown and latency over time."
  proof_object:
